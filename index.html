    let cart = []; let total = 0;

    function render(cat = 'all') {
        const list = document.getElementById('menu-list');
        const filtered = cat === 'all' ? items : items.filter(i => i.c === cat);
        list.innerHTML = filtered.map(item => `
            <div class="bg-white/95 rounded-3xl p-3 flex items-center gap-4 shadow-xl border-l-4 border-yellow-400">
                <img src="${item.i}" class="w-20 h-20 rounded-2xl object-cover shadow-md">
                <div class="flex-1">
                    <h3 class="text-gray-900 font-black text-[11px] uppercase leading-tight">${item.n}</h3>
                    <p class="price-text font-black text-lg">${item.p} <span class="text-[10px] text-gray-400">ETB</span></p>
                </div>
                <button onclick="add('${item.n}', ${item.p})" class="bg-yellow-400 text-black w-10 h-10 rounded-xl font-black shadow-lg active:scale-90">+</button>
            </div>
        `).join('');
    }

    function add(n, p) {
        cart.push(n); total += p;
        document.getElementById('total').innerText = total;
        document.getElementById('cart-summary').innerText = cart.join(", ");
        document.getElementById('checkout').classList.remove('hidden');
    }

    function resetCart() {
        if(confirm("Empty your cart?")) {
            cart = []; total = 0;
            document.getElementById('checkout').classList.add('hidden');
            document.getElementById('preview').classList.add('hidden');
            document.getElementById('up-text').innerText = "Upload Receipt";
            document.getElementById('up-text').classList.remove('text-green-600');
        }
    }

    function handleFile(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const p = document.getElementById('preview');
            p.src = e.target.result; p.classList.remove('hidden');
            document.getElementById('up-text').innerText = "Loaded ✅";
            document.getElementById('up-text').classList.add('text-green-600');
        }
        reader.readAsDataURL(input.files[0]);
    }

    function filter(cat, btn) {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(cat);
    }

    function showPay() { document.getElementById('pay-modal').classList.remove('hidden'); }
    function hidePay() { document.getElementById('pay-modal').classList.add('hidden'); }

    render();
</
