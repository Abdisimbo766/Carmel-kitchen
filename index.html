<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel | Digital Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .category-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; overflow: hidden; margin-bottom: 2.5rem; }
        .item-row { border-bottom: 1px solid #111; padding: 12px 0; display: flex; align-items: center; gap: 12px; }
        .item-row:last-child { border-bottom: none; }
        .item-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: #1a1a1a; flex-shrink: 0; }
        .floating-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); border-top: 1px solid #333; padding: 20px; z-index: 100; }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="mb-8" id="capture-header">
        <h1 class="text-4xl font-black text-orange-500 italic tracking-tighter uppercase">CARMEL</h1>
        <div class="mt-2 flex justify-between items-end">
            <div>
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest leading-none mb-1">CBE / Abyssinia / Telebirr</p>
                <p class="text-sm font-black text-white italic">Account: Abdi Tesfaye</p>
            </div>
            <button onclick="takeScreenshot()" class="bg-white/5 border border-white/10 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider">
                📸 Save Screenshot
            </button>
        </div>
    </header>

    <div id="menu-container">
        </div>

    <div class="floating-bar">
        <div class="max-w-screen-xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-zinc-500 uppercase font-black tracking-widest">Your Total</p>
                <p id="grand-total" class="text-2xl font-black text-orange-500">0 Birr</p>
            </div>
            <button onclick="sendToCashier()" class="bg-orange-500 text-black px-8 py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:scale-105 transition-transform active:scale-95">
                Send to Cashier
            </button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");

        const fullMenuData = [
            // BURGERS
            { c:'burger', n:'House Special Burger', p:650, i:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200', h:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800' },
            { c:'burger', n:'Fasting Burger', p:390, i:'https://images.unsplash.com/photo-1512152272829-e3139592d56f?w=200' },
            { c:'burger', n:'Classic Beef Burger', p:490, i:'https://images.unsplash.com/photo-1550547660-d9450f859349?w=200' },
            { c:'burger', n:'Chessic Beef Burger ★', p:550, i:'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=200' },
            { c:'burger', n:'Spicy Hot Burger 🔥', p:550, i:'https://images.unsplash.com/photo-1525164286253-04e68b9d94bb?w=200' },
            { c:'burger', n:'Chicken Double Burger', p:590, i:'https://images.unsplash.com/photo-1606755962773-d324e0a13086?w=200' },
            { c:'burger', n:'Double Beef Burger', p:590, i:'https://images.unsplash.com/photo-1586190848861-99aa4a171e90?w=200' },
            { c:'burger', n:'BBQ Juicy Burger', p:590, i:'https://images.unsplash.com/photo-1553979459-d2229ba7433b?w=200' },
            { c:'burger', n:'Mountain Burger 🏔️', p:720, i:'https://images.unsplash.com/photo-1596662951482-0c4ba74a6df6?w=200' },
            { c:'burger', n:'VIP Burger 🔥', p:790, i:'https://images.unsplash.com/photo-1610440042657-612f34b95e9f?w=200' },
            { c:'burger', n:'Chips 🍟', p:190, i:'https://images.unsplash.com/photo-1573082836141-549b29270bb1?w=200' },

            // WRAPS & CHICKEN
            { c:'Wraps & Chicken', n:'2 Pc Fried Chicken', p:490, i:'https://images.unsplash.com/photo-1626645738196-c2a7c8d08f58?w=200', h:'https://images.unsplash.com/photo-1626645738196-c2a7c8d08f58?w=800' },
            { c:'Wraps & Chicken', n:'Beef Wrap', p:490, i:'https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=200' },
            { c:'Wraps & Chicken', n:'Chicken Wrap', p:490, i:'https://images.unsplash.com/photo-1504544750208-dc0358e63f7f?w=200' },
            { c:'Wraps & Chicken', n:'Egg Sandwich', p:190, i:'https://images.unsplash.com/photo-1525351484163-7529414344d8?w=200' },

            // PIZZA
            { c:'pizza', n:'Special Pizza (Reg)', p:690, i:'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200', h:'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800' },
            { c:'pizza', n:'Tuna Pizza (Reg)', p:670, i:'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200' },
            { c:'pizza', n:'Beef Pizza (Reg)', p:650, i:'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200' },

            // BREAKFAST
            { c:'breakfast', n:'Full Breakfast', p:150, i:'https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?w=200', h:'https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?w=800' },
            { c:'breakfast', n:'Chachabesa', p:200, i:'https://images.unsplash.com/photo-1589113103553-5384496ff27b?w=200' },
            { c:'breakfast', n:'Tibs Firfir', p:290, i:'https://images.unsplash.com/photo-1610440042657-612f34b95e9f?w=200' },

            // JUICE & SHAKES
            { c:'juice', n:'Avocado 🥑', p:180, i:'https://images.unsplash.com/photo-1623065422902-30a2ad299dd4?w=200', h:'https://images.unsplash.com/photo-1613478223719-2ab802602423?w=800' },
            { c:'juice', n:'Mixed Juice 🍹', p:250, i:'https://images.unsplash.com/photo-1613478223719-2ab802602423?w=200' },
            { c:'juice', n:'Carmel Special ⭐', p:320, i:'https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=200' },
            { c:'juice', n:'Strawberry Mojito 🍓', p:200, i:'https://images.unsplash.com/photo-1546173159-315724a31696?w=200' },

            // COFFEE & TEA
            { c:'coffee&tea', n:'Jebena Coffee ★', p:40, i:'https://images.unsplash.com/photo-1541167760496-162955ed8a9f?w=200', h:'https://images.unsplash.com/photo-1541167760496-162955ed8a9f?w=800' },
            { c:'coffee&tea', n:'Macchiato ★', p:70, i:'https://images.unsplash.com/photo-1536700503339-1e4b06520771?w=200' },
            { c:'coffee&tea', n:'Latte', p:100, i:'https://images.unsplash.com/photo-1541167760496-162955ed8a9f?w=200' }
        ];

        let cart = [];

        function renderMenu() {
            const categories = [...new Set(fullMenuData.map(item => item.c))];
            const container = document.getElementById('menu-container');
            
            categories.forEach(catName => {
                const items = fullMenuData.filter(i => i.c === catName);
                const headerImg = items.find(i => i.h)?.h || items[0].i;
                
                let html = `
                    <div class="category-card">
                        <img src="${headerImg}" class="w-full h-56 object-cover" alt="${catName}">
                        <div class="p-6">
                            <h2 class="text-[11px] font-black uppercase text-orange-500 tracking-[0.3em] mb-4">${catName} Menu</h2>
                            <div class="space-y-1">
                `;

                items.forEach(item => {
                    html += `
                        <div class="item-row">
                            <img src="${item.i}" class="item-img" alt="${item.n}">
                            <div class="flex-grow">
                                <p class="text-[13px] font-black uppercase tracking-tight">${item.n}</p>
                                <p class="text-xs text-zinc-500 font-bold">${item.p} Birr</p>
                            </div>
                            <button onclick='addToOrder("${item.n}", ${item.p})' class="bg-white/5 border border-white/10 w-10 h-10 rounded-xl font-black text-orange-500 hover:bg-orange-500 hover:text-black transition-all">+</button>
                        </div>
                    `;
                });

                html += `</div></div></div>`;
                container.innerHTML += html;
            });
        }

        function addToOrder(name, price) {
            const existing = cart.find(i => i.n === name);
            if(existing) existing.qty++; else cart.push({n: name, p: price, qty: 1});
            updateTotal();
        }

        function updateTotal() {
            const total = cart.reduce((acc, i) => acc + (i.p * i.qty), 0);
            document.getElementById('grand-total').innerText = total + " Birr";
        }

        async function sendToCashier() {
            if(cart.length === 0) return alert("Select items first!");
            if(confirm("Confirm: Send order to Cashier?")) {
                for(const i of cart) {
                    await _supabase.from('orders').insert([{ 
                        item_name: i.n, quantity: i.qty, total_price: i.p * i.qty, status: 'pending' 
                    }]);
                }
                alert("Order sent! Please show this screen to the cashier.");
                cart = [];
                updateTotal();
            }
        }

        function takeScreenshot() {
            html2canvas(document.body).then(canvas => {
                let link = document.createElement('a');
                link.download = 'Carmel-Order.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        renderMenu();
    </script>
</body>
</html>
