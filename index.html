let cart = [];
let total = 0;
let base64Img = "";

window.showPayment = () => {
    document.getElementById('payment-modal').classList.remove('hidden');
};
window.closePayment = () => {
    document.getElementById('payment-modal').classList.add('hidden');
};
window.copyAccount = (acc, name) => {
    navigator.clipboard.writeText(acc);
    alert(`${name} account copied!`);
};

window.handleFile = (input) => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 400; 
            const scaleSize = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scaleSize;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            base64Img = canvas.toDataURL('image/jpeg', 0.6); 
            document.getElementById('preview').src = base64Img;
            document.getElementById('preview').classList.remove('hidden');
            document.getElementById('upload-text').innerText = "ደረሰኝ ተዘጋጅቷል ✅";
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
};

window.add = (name, price) => {
    cart.push(name);
    total += price;
    document.getElementById('total').innerText = total;
    document.getElementById('checkout').classList.remove('hidden');
};

window.resetCart = () => {
    cart = [];
    total = 0;
    document.getElementById('total').innerText = 0;
    document.getElementById('checkout').classList.add('hidden');
    document.getElementById('preview').classList.add('hidden');
    base64Img = "";
};

window.order = async (method, btn) => {
    if(!base64Img) return alert("እባክዎ መጀመሪያ ደረሰኝ ይጫኑ!");
    if(cart.length === 0) return alert("ካርቱ ባዶ ነው!");

    btn.innerText = "በመላክ ላይ...";
    btn.disabled = true;

    try {
        const today = new Date();
        today.setHours(0,0,0,0);
        
        const countRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=id&created_at=gte.${today.toISOString()}`, {
            headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
        });
        const todayData = await countRes.json();
        const queueNumber = String(todayData.length + 1).padStart(3, '0');

        const formData = new FormData();
        formData.append("image", base64Img.split(",")[1]);
        const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
        const imgData = await imgRes.json();

        const supabaseRes = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
            method: "POST",
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                queue_no: queueNumber,
                items: cart.join(", "),
                total_price: total,
                payment_method: method,
                receipt_url: imgData.data.url,
                status: "pending",
                created_at: new Date().toISOString()
            })
        });

        if(supabaseRes.ok) {
            const text = `🔹 **ተራ ቁጥር: #${queueNumber}**\n🛒 **ትዕዛዝ:** ${cart.join(", ")}\n💰 **ዋጋ:** ${total} ETB\n💳 **ክፍያ:** ${method}`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, photo: imgData.data.url, caption: text, parse_mode: "Markdown" })
            });
            alert(`ትዕዛዝዎ ተልኳል! ተራ ቁጥር: #${queueNumber}`);
            location.reload();
        }
    } catch (e) {
        alert("ስህተት ተፈጥሯል!");
        btn.disabled = false;
        btn.innerText = method;
    }
};

window.filter = (cat) => {
    const list = document.getElementById('menu-list');
    const btns = document.querySelectorAll('.category-btn');
    btns.forEach(b => b.classList.remove('active'));
    const filtered = cat === 'all' ? items : items.filter(i => i.c === cat);
    list.innerHTML = filtered.map(item => `
        <div class="bg-white rounded-[2rem] p-3 flex items-center gap-4 shadow-sm">
            <img src="${item.i}" class="w-24 h-24 rounded-[1.5rem] object-cover shadow-inner">
            <div class="flex-1">
                <h3 class="font-black text-gray-800 text-sm uppercase leading-tight">${item.n}</h3>
                <p class="text-orange-500 font-black text-lg">${item.p} <span class="text-[10px]">ETB</span></p>
            </div>
            <button onclick="add('${item.n}', ${item.p})" class="bg-yellow-400 text-black w-10 h-10 rounded-xl font-bold">+</button>
        </div>
    `).join('');
};

filter('all');
