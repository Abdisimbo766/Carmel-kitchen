<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Bar - Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000; color: white; }
        .order-card { 
            animation: pulse 2s infinite; 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.01); border-color: #00d4ff; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="p-6">
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-900/20 to-black"></div>
    </div>

    <div class="flex justify-between items-center mb-8 border-b border-blue-900/30 pb-4">
        <h1 class="text-3xl font-black text-blue-400 font-italic">🍹 CARMEL BAR ORDERS</h1>
        <div id="status" class="text-xs bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20">ዝግጁ</div>
    </div>

    <div id="bar-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const SUPABASE_URL = "https://csdpoyqbkjljaqknunyv.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadBarOrders() {
            const { data, error } = await _supabase
                .from('orders')
                .select('*')
                .eq('status', 'verified')
                .order('created_at', { ascending: true });

            if (data) {
                const barGrid = document.getElementById('bar-grid');
                barGrid.innerHTML = '';
                // Filtering for common bar keywords
                const barItems = data.filter(order => 
                    order.items.toLowerCase().includes('juice') || 
                    order.items.toLowerCase().includes('coffee') || 
                    order.items.toLowerCase().includes('tea') || 
                    order.items.toLowerCase().includes('milkshake') || 
                    order.items.toLowerCase().includes('mojito')
                );

                barItems.forEach(order => {
                    const card = document.createElement('div');
                    card.className = "p-6 rounded-3xl order-card";
                    card.innerHTML = `
                        <div class="flex justify-between mb-4">
                            <span class="text-slate-500 text-[10px]">${new Date(order.created_at).toLocaleTimeString()}</span>
                            <span class="text-blue-400 text-[10px] font-bold tracking-widest uppercase">Drink Order</span>
                        </div>
                        <h3 class="text-xl font-bold mb-6 text-white">${order.items}</h3>
                        <button onclick="markDone('${order.id}')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-2xl transition-all">
                            ተረክቧል ✅
                        </button>
                    `;
                    barGrid.appendChild(card);
                });
            }
        }

        async function markDone(id) {
            await _supabase.from('orders').update({ status: 'done' }).eq('id', id);
            loadBarOrders();
        }

        _supabase.channel('bar-orders')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders' }, () => loadBarOrders())
            .subscribe();

        loadBarOrders();
    </script>
</body>
</html
