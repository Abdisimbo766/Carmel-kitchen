<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Kitchen - Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .order-card { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); border-color: #f39c12; }
            100% { transform: scale(1); }
            body {
    background-color: #000; /* ባግራውንዱን ጥቁር አድርገው */
    color: white; /* ጽሁፎቹ እንዲታዩ ነጭ አድርጋቸው */
}

/* ካርዶቹ በቪዲዮው ላይ ግልጽ (Transparent) እንዲሆኑ */
.order-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}
            
        }
    </style>
</head>
<div class="fixed inset-0 -z-10 overflow-hidden">
    <video autoplay muted loop playsinline class="w-full h-full object-cover opacity-30 grayscale-[20%]">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-fresh-flame-grilled-burger-34504-large.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="absolute inset-0 bg-gradient-to-b from-black/60 to-black/80"></div>
</div>

    <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
        <h1 class="text-3xl font-black text-orange-500">👨‍🍳የባር ተዛዝ መቀበያ</h1>
        <div id="status" class="text-sm bg-green-500/20 text-green-400 px-3 py-1 rounded-full">ማሳወቂያ ዝግጁ ነው</div>
    </div>

    <div id="kitchen-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // ገጹ እንደተከፈተ ቼክ ያደርጋል
if (sessionStorage.getItem('isLogged') !== 'true') {
    // ገና ካልገባ ወደ መግቢያ ገጹ ይመልሰው
    window.location.href = "login.html"; 
}
        // 1. የ Supabase መረጃዎች (Legacy Anon Key መጠቀምህን አረጋግጥ)
        const SUPABASE_URL = "https://icubeupnkfulidmtiqsz.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdWJldXBua2Z1bGlkbXRpcXN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTg5MTAsImV4cCI6MjA4ODg3NDkxMH0.-sRfDPpsTh5ohKUmG460xvlS0RW6jYg8SsYGDDI7P-k";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const kitchenGrid = document.getElementById('kitchen-grid');
        const notifSound = document.getElementById('notif-sound');

        // 2. Verified የሆኑ ትዕዛዞችን መጫን
        async function loadOrders() {
            const { data, error } = await supabaseClient
                .from('orders')
                .select('*')
                .eq('status', 'verified')
                .order('created_at', { ascending: true });

            if (data) {
                kitchenGrid.innerHTML = '';
                data.forEach(order => renderOrder(order));
            }
        }

        // 3. ትዕዛዙን ስክሪን ላይ መሳል
        function renderOrder(order) {
            const card = document.createElement('div');
            card.className = "bg-slate-800 border-2 border-slate-700 rounded-3xl p-6 shadow-xl relative order-card";
            card.innerHTML = `
                <div class="flex justify-between mb-4">
                    <span class="text-slate-400 text-xs">${new Date(order.created_at).toLocaleTimeString()}</span>
                    <span class="bg-orange-600 text-white text-[10px] px-2 py-1 rounded-lg font-bold">አዲስ</span>
                </div>
                <h3 class="text-xl font-bold mb-4 text-slate-100">${order.items}</h3>
                <div class="flex justify-between items-center mt-6">
                    <div class="text-orange-400 font-bold">${order.payment_method}</div>
                    <button onclick="markDone('${order.id}')" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-6 rounded-2xl transition-all">
                        ተረክቧል ✅
                    </button>
                </div>
            `;
            kitchenGrid.appendChild(card);
        }

        // 4. ምግብ ሲያልቅ [Done] ለማለት - እዚህ ጋር supabaseClient መሆኑን አረጋግጥ
        async function markDone(orderId) {
            const { error } = await supabaseClient
                .from('orders')
                .update({ status: 'done' })
                .eq('id', orderId);
            
            if (!error) loadOrders();
        }

        // 5. Real-time ማዳመጥ
        supabaseClient
            .channel('orders')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders' }, payload => {
                if (payload.new.status === 'verified') {
                    notifSound.play().catch(e => console.log("Sound error:", e));
                    loadOrders();
                }
            })
            .subscribe();

        loadOrders();
    </script>
</body>
</html>
