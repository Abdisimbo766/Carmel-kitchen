<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel - Bar & Drinks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .drink-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 150, 255, 0.1); backdrop-filter: blur(10px); border-radius: 2.5rem; transition: 0.3s; }
        .drink-card:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="p-6 lg:p-12">

    <header class="flex justify-between items-center mb-12 border-b border-blue-500/20 pb-8">
        <div>
            <h1 class="text-5xl font-black italic tracking-tighter text-blue-500 uppercase">Bar Orders</h1>
            <p id="staff-name-display" class="text-[10px] text-zinc-500 uppercase tracking-[0.4em] mt-2 font-bold">Barista Loading...</p>
        </div>
        <div class="text-right">
            <span class="text-[10px] font-black uppercase tracking-widest text-blue-400">Drinks Station</span>
        </div>
    </header>

    <div id="orders-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    <script>
        const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");

        // 1. SECURITY CHECK
        const staffName = sessionStorage.getItem('staffName');
        if (!staffName) {
            window.location.href = "Login.html";
        } else {
            document.getElementById('staff-name-display').innerText = `Barista: ${staffName}`;
        }

        // 2. LOAD DRINK ORDERS
        async function loadOrders() {
            const { data: orders } = await _supabase
                .from('orders')
                .select('*')
                .eq('status', 'pending')
                .order('created_at', { ascending: true });

            const container = document.getElementById('orders-container');
            container.innerHTML = '';

            if (orders && orders.length > 0) {
                orders.forEach(order => {
                    const items = JSON.parse(order.items_json || '[]');
                    
                    container.innerHTML += `
                        <div class="drink-card p-8 flex flex-col justify-between glow-blue">
                            <div>
                                <p class="text-blue-500 font-black mb-4">ORDER #${order.id.toString().slice(-3)}</p>
                                <div class="space-y-4 mb-8">
                                    ${items.map(i => `
                                        <div class="flex justify-between items-center border-b border-white/5 pb-2">
                                            <p class="font-bold text-lg text-zinc-200">${i.name}</p>
                                            <p class="text-blue-400 font-black">x${i.quantity}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <button onclick="finishOrder('${order.id}', ${order.items_json})" 
                                class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black uppercase text-sm transition-all active:scale-95">
                                Drink Ready 🥤
                            </button>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-zinc-700 font-bold uppercase tracking-widest">No drinks in queue...</div>`;
            }
        }

        // 3. FINISH & SUBTRACT STOCK
        async function finishOrder(orderId, items) {
            const { error } = await _supabase.from('orders').update({ status: 'done' }).eq('id', orderId);

            if (!error) {
                for (const item of items) {
                    const name = item.name.toLowerCase();
                    const qty = item.quantity;

                    // Coffee Logic (Subtracts 20g per cup)
                    if (name.includes('coffee') || name.includes('jebena') || name.includes('macchiato')) {
                        await updateInventory('Coffee Beans', 0.02 * qty);
                    }

                    // Milk Logic (Subtracts 0.2L per cup)
                    if (name.includes('milk') || name.includes('macchiato') || name.includes('shake')) {
                        await updateInventory('Milk', 0.2 * qty);
                    }

                    // Avocado Logic (Subtracts 0.5kg per juice)
                    if (name.includes('avocado')) {
                        await updateInventory('Avocado', 0.5 * qty);
                    }

                    // Sugar Logic (Subtracts 0.05kg per drink)
                    if (name.includes('juice') || name.includes('tea')) {
                        await updateInventory('Sugar', 0.05 * qty);
                    }
                }
                loadOrders();
            }
        }

        async function updateInventory(itemName, amount) {
            const { data } = await _supabase.from('inventory').select('id, quantity').eq('name', itemName).maybeSingle();
            if (data) {
                await _supabase.from('inventory').update({ quantity: data.quantity - amount }).eq('id', data.id);
            }
        }

        // Live refresh
        _supabase.channel('bar_updates').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, loadOrders).subscribe();
        loadOrders();
    </script>
</body>
</html>
