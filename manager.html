<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Manager Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .filter-btn { font-size: 10px; font-weight: 900; padding: 6px 20px; border-radius: 9999px; border: 1px solid #f97316; transition: 0.3s; }
        .filter-inactive { border-color: rgba(255,255,255,0.1); color: #666; }
        .filter-active { background: #f97316; color: black; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-start mb-16">
            <div>
                <h1 class="text-5xl font-black italic text-orange-500 uppercase tracking-tighter italic">MANAGER HUB</h1>
                <div class="flex gap-3 mt-6">
                    <button onclick="setTimeFilter(1)" id="btn-1" class="filter-btn filter-active">1 DAY</button>
                    <button onclick="setTimeFilter(7)" id="btn-7" class="filter-btn filter-inactive">7 DAYS</button>
                    <button onclick="setTimeFilter(30)" id="btn-30" class="filter-btn filter-inactive">30 DAYS</button>
                </div>
            </div>
            
            <div class="flex gap-12">
                <div class="text-right">
                    <p id="revenue" class="text-3xl font-bold">0 Birr</p>
                    <p class="text-[10px] text-zinc-500 uppercase font-black tracking-widest">Today's Sales</p>
                </div>
                <div class="text-right">
                    <p id="net-profit" class="text-4xl font-black text-green-400">-0 Birr</p>
                    <p class="text-[10px] text-zinc-500 uppercase font-black tracking-widest">Net Profit</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div>
                <h2 class="text-sm font-black uppercase text-orange-500/50 mb-6 tracking-widest">Recent Records</h2>
                <div class="card p-8 space-y-6" id="expense-list">
                    </div>
            </div>

            <div class="lg:col-span-2">
                <h2 class="text-sm font-black uppercase text-orange-500/50 mb-6 tracking-widest">Stock Inventory</h2>
                <div class="card p-10">
                    <table class="w-full text-left">
                        <tbody id="stock-list" class="divide-y divide-white/5">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");
        
        let daysFilter = 1;

        function setTimeFilter(days) {
            daysFilter = days;
            [1, 7, 30].forEach(d => {
                document.getElementById(`btn-${d}`).className = d === days ? 'filter-btn filter-active' : 'filter-btn filter-inactive';
            });
            refreshData();
        }

        async function refreshData() {
            const filterDate = new Date();
            filterDate.setDate(filterDate.getDate() - (daysFilter - 1));
            filterDate.setHours(0,0,0,0);
            const iso = filterDate.toISOString();

            // 1. Fetch Data
            const { data: expData } = await _supabase.from('expenses').select('*').gte('created_at', iso).order('created_at', { ascending: false });
            const { data: revData } = await _supabase.from('orders').select('total_price').eq('status', 'done').gte('created_at', iso);
            const { data: stockData } = await _supabase.from('inventory').select('*').order('item_name', { ascending: true });

            // 2. Calculations
            let totalSales = 0; if(revData) revData.forEach(r => totalSales += r.total_price);
            let totalExp = 0; if(expData) expData.forEach(e => totalExp += e.amount_spent);
            
            document.getElementById('revenue').innerText = `${totalSales} Birr`;
            document.getElementById('net-profit').innerText = `${totalSales - totalExp} Birr`;

            // 3. Render Expenses (With Description/Note)
            const expDiv = document.getElementById('expense-list');
            expDiv.innerHTML = '';
            if(expData) {
                expData.slice(0, 10).forEach(e => {
                    expDiv.innerHTML += `
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-bold text-white text-lg leading-tight">${e.item_name}</p>
                                ${e.description ? `<p class="text-orange-500 text-xs font-bold italic mt-1">"${e.description}"</p>` : ''}
                                <p class="text-[9px] text-zinc-600 uppercase font-black mt-1">${e.bought_by || 'CASHIER'}</p>
                            </div>
                            <p class="text-red-500 font-bold text-lg">-${e.amount_spent}</p>
                        </div>`;
                });
            }

            // 4. Render Stock (Fixing your empty box)
            const stockTable = document.getElementById('stock-list');
            stockTable.innerHTML = '';
            if(stockData) {
                stockData.forEach(s => {
                    const isLow = s.quantity <= s.min_limit;
                    stockTable.innerHTML += `
                        <tr class="group">
                            <td class="py-5 font-bold text-zinc-300 text-lg uppercase">${s.item_name}</td>
                            <td class="py-5 text-right font-black ${isLow ? 'text-red-500' : 'text-white'} text-xl">
                                ${s.quantity} <span class="text-[10px] text-zinc-500 ml-1 font-normal">${s.unit}</span>
                            </td>
                        </tr>`;
                });
            }
        }

        refreshData();
        setInterval(refreshData, 30000); // Auto refresh every 30s
    </script>
</body>
</html>
