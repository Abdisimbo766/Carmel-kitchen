<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Cashier Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .input-field { background: #111; border: 1px solid rgba(255, 255, 255, 0.1); padding: 0.75rem; border-radius: 0.75rem; font-size: 0.875rem; width: 100%; color: white; }
        .input-field:focus { border-color: #f97316; outline: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-orange-500/20 pb-4">
            <h1 class="text-3xl font-black italic text-orange-500 uppercase">CASHIER</h1>
            <p id="staff-name-display" class="text-xs text-zinc-500 font-bold uppercase"></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card p-6 border-white/5">
                <h2 class="text-orange-500 font-black mb-4 uppercase text-xs italic">Submit Order</h2>
                <div class="space-y-4">
                    <input id="item-search" type="text" placeholder="Menu Item Name" class="input-field">
                    <input id="order-qty" type="number" value="1" class="input-field">
                    <button onclick="placeOrder()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-xs">Submit Order</button>
                </div>
            </div>

            <div class="card p-6 border-orange-500/10">
                <h2 class="text-orange-500 font-black mb-4 uppercase text-xs italic">Log Expense</h2>
                <div class="space-y-4">
                    <select id="exp-item-select" class="input-field" onchange="toggleOtherBox()">
                        <option value="">Loading Inventory...</option>
                    </select>

                    <div id="other-note-container" class="hidden">
                        <input id="exp-note" type="text" placeholder="What is this for? (e.g. Transport)" class="input-field border-orange-500/40">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <input id="exp-qty" type="number" oninput="calcTotal()" placeholder="Qty" class="input-field">
                        <input id="exp-unit-price" type="number" oninput="calcTotal()" placeholder="Price" class="input-field">
                    </div>

                    <div class="bg-orange-500/5 p-4 rounded-xl border border-orange-500/20 text-center text-2xl font-black text-orange-500" id="total-display">
                        0 Birr
                    </div>

                    <button onclick="logPurchase()" class="w-full bg-orange-500 text-black font-black py-4 rounded-xl uppercase text-xs">Submit & Update</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");
        const staffName = sessionStorage.getItem('staffName') || 'Guest';
        document.getElementById('staff-name-display').innerText = `Staff: ${staffName}`;

        async function loadInventoryDropdown() {
            const { data } = await _supabase.from('inventory').select('item_name').order('item_name', { ascending: true });
            const select = document.getElementById('exp-item-select');
            select.innerHTML = '<option value="">-- Choose Item --</option>';
            if(data) data.forEach(item => select.innerHTML += `<option value="${item.item_name}">${item.item_name}</option>`);
            select.innerHTML += `<option value="Other (Non-Stock)">Other (Transport/Rent/etc)</option>`;
        }

        function toggleOtherBox() {
            const val = document.getElementById('exp-item-select').value;
            document.getElementById('other-note-container').classList.toggle('hidden', val !== "Other (Non-Stock)");
        }

        function calcTotal() {
            const qty = parseFloat(document.getElementById('exp-qty').value) || 0;
            const price = parseFloat(document.getElementById('exp-unit-price').value) || 0;
            const total = qty * price;
            document.getElementById('total-display').innerText = `${total} Birr`;
            return total;
        }

        async function logPurchase() {
            const item = document.getElementById('exp-item-select').value;
            const note = document.getElementById('exp-note').value;
            const qty = parseFloat(document.getElementById('exp-qty').value);
            const price = parseFloat(document.getElementById('exp-unit-price').value);
            const total = qty * price;

            if(!item || !qty || !price) return alert("Fill all fields");

            const { error } = await _supabase.from('expenses').insert([{ 
                item_name: item, 
                description: note, 
                amount_spent: total, 
                quantity_bought: qty, 
                unit: "purchase", // THIS FIXES YOUR ERROR
                bought_by: staffName 
            }]);

            if (error) return alert("Error: " + error.message);

            if (item !== "Other (Non-Stock)") {
                const { data: inv } = await _supabase.from('inventory').select('quantity').eq('item_name', item).single();
                if(inv) await _supabase.from('inventory').update({ quantity: inv.quantity + qty }).eq('item_name', item);
            }

            alert("Logged!");
            location.reload();
        }

        async function placeOrder() {
            alert("Order Submitted");
        }

        loadInventoryDropdown();
    </script>
</body>
</html>
