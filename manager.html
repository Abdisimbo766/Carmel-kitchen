<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Manager Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .filter-btn { font-size: 10px; font-weight: 900; padding: 4px 16px; border-radius: 9999px; border: 1px solid rgba(249, 115, 22, 0.2); }
        .filter-active { background: #f97316; color: black; border-color: #f97316; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-orange-500/20 pb-6">
            <div>
                <h1 class="text-4xl font-black italic text-orange-500 uppercase">MANAGER HUB</h1>
                <div class="flex gap-2 mt-4">
                    <button onclick="setTimeFilter(1)" id="btn-1" class="filter-btn filter-active">1 DAY</button>
                    <button onclick="setTimeFilter(7)" id="btn-7" class="filter-btn text-orange-500">7 DAYS</button>
                    <button onclick="setTimeFilter(30)" id="btn-30" class="filter-btn text-orange-500">30 DAYS</button>
                </div>
            </div>
            
            <div class="flex gap-8">
                <div class="text-right">
                    <p id="revenue" class="text-2xl font-bold text-white">0 Birr</p>
                    <p id="sales-label" class="text-[10px] text-zinc-500 uppercase font-black">Today's Sales</p>
                </div>
                <div class="text-right border-l border-white/10 pl-8">
                    <p id="net-profit" class="text-2xl font-black text-green-400">0 Birr</p>
                    <p class="text-[10px] text-zinc-500 uppercase font-black">Net Profit</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div>
                <h2 class="text-xs font-black uppercase text-red-500/50 mb-4 ml-2">Recent Records</h2>
                <div class="card p-6">
                    <div id="expense-list" class="space-y-4"></div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h2 class="text-xs font-black uppercase text-orange-500/50 mb-4 ml-2">Stock Inventory</h2>
                <div class="card p-8">
                    <table class="w-full text-left">
                        <tbody id="stock-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");
        let daysFilter = 1;

        function setTimeFilter(days) {
            daysFilter = days;
            [1, 7, 30].forEach(d => {
                document.getElementById(`btn-${d}`).className = d === days ? 'filter-btn filter-active' : 'filter-btn text-orange-500';
            });
            refreshData();
        }

        async function refreshData() {
            const filterDate = new Date();
            filterDate.setDate(filterDate.getDate() - (daysFilter - 1));
            filterDate.setHours(0,0,0,0);

            // Fetch Expenses
            const { data: expData, error } = await _supabase.from('expenses')
                .select('*')
                .gte('created_at', filterDate.toISOString())
                .order('created_at', { ascending: false });

            // Fetch Sales
            const { data: rev } = await _supabase.from('orders')
                .select('total_price')
                .eq('status', 'done')
                .gte('created_at', filterDate.toISOString());
            
            let totalSales = 0; if(rev) rev.forEach(o => totalSales += o.total_price);
            let totalExp = 0; if(expData) expData.forEach(e => totalExp += e.amount_spent);
            
            document.getElementById('revenue').innerText = `${totalSales} Birr`;
            document.getElementById('net-profit').innerText = `${totalSales - totalExp} Birr`;

            // RENDER EXPENSE LIST (With Description)
            const expDiv = document.getElementById('expense-list');
            expDiv.innerHTML = '';
            
            if(expData) {
                expData.slice(0, 10).forEach(e => {
                    // This is the part that shows your (Transport) note
                    expDiv.innerHTML += `
                        <div class="border-b border-white/5 pb-2">
                            <div class="flex justify-between">
                                <p class="font-bold text-white text-sm">${e.item_name}</p>
                                <p class="text-red-400 font-bold text-sm">-${e.amount_spent}</p>
                            </div>
                            ${e.description ? `<p class="text-[11px] text-orange-400 font-bold italic">Note: ${e.description}</p>` : ''}
                            <p class="text-[9px] text-zinc-600 uppercase">${e.bought_by}</p>
                        </div>`;
                });
            }
        }

        refreshData();
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
