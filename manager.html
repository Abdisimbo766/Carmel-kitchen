<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Cashier Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .input-field { background: #111; border: 1px solid rgba(255, 255, 255, 0.1); padding: 0.75rem; border-radius: 0.75rem; font-size: 0.875rem; width: 100%; color: white; }
        .input-field:focus { border-color: #f97316; outline: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-orange-500/20 pb-4">
            <h1 class="text-3xl font-black italic text-orange-500 uppercase">CASHIER</h1>
            <p id="staff-name-display" class="text-xs text-zinc-500 font-bold uppercase"></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card p-6 border-white/5">
                <h2 class="text-orange-500 font-black mb-4 uppercase text-xs italic">Submit Order</h2>
                <div class="space-y-4">
                    <input id="item-search" type="text" placeholder="Menu Item Name" class="input-field">
                    <input id="order-qty" type="number" value="1" class="input-field">
                    <button onclick="placeOrder()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-xs">Submit Order</button>
                </div>
            </div>

            <div class="card p-6 border-orange-500/10 shadow-[0_0_20px_rgba(249,115,22,0.05)]">
                <h2 class="text-orange-500 font-black mb-4 uppercase text-xs italic">Log Expense</h2>
                <div class="space-y-4">
                    <select id="exp-item-select" class="input-field" onchange="toggleOtherBox()">
                        <option value="">Loading Inventory...</option>
                    </select>

                    <div id="other-note-container" class="hidden">
                        <input id="exp-note" type="text" placeholder="Note (e.g. Transport/Rent)" class="input-field border-orange-500/40">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <input id="exp-qty" type="number" oninput="calcTotal()" placeholder="Qty" class="input-field">
                        <input id="exp-unit-price" type="number" oninput="calcTotal()" placeholder="Price" class="input-field">
                    </div>

                    <div class="bg-orange-500/5 p-4 rounded-xl border border-orange-500/20 text-center text-2xl font-black text-orange-500" id="total-display">0 Birr</div>

                    <button id="submit-btn" onclick="logPurchase()" class="w-full bg-orange-500 text-black font-black py-4 rounded-xl uppercase text-xs hover:bg-orange-400">Submit & Update</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");
        const staffName = sessionStorage.getItem('staffName') || 'CASHIER';
        document.getElementById('staff-name-display').innerText = `Staff: ${staffName}`;
        
        let inventoryData = [];

        async function loadInventory() {
            const { data } = await _supabase.from('inventory').select('*').order('item_name', { ascending: true });
            inventoryData = data || [];
            const select = document.getElementById('exp-item-select');
            select.innerHTML = '<option value="">-- Choose Item --</option>';
            inventoryData.forEach(i => select.innerHTML += `<option value="${i.item_name}">${i.item_name}</option>`);
            select.innerHTML += `<option value="Other">Other (Transport/Rent)</option>`;
        }

        function toggleOtherBox() {
            const isOther = document.getElementById('exp-item-select').value === "Other";
            document.getElementById('other-note-container').classList.toggle('hidden', !isOther);
        }

        function calcTotal() {
            const q = parseFloat(document.getElementById('exp-qty').value) || 0;
            const p = parseFloat(document.getElementById('exp-unit-price').value) || 0;
            document.getElementById('total-display').innerText = `${q * p} Birr`;
        }

        async function logPurchase() {
            const itemName = document.getElementById('exp-item-select').value;
            const note = document.getElementById('exp-note').value;
            const qty = parseFloat(document.getElementById('exp-qty').value);
            const price = parseFloat(document.getElementById('exp-unit-price').value);
            const btn = document.getElementById('submit-btn');

            if(!itemName || !qty || !price) return alert("Please fill all fields!");

            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            // Find the unit from the inventory table
            const match = inventoryData.find(i => i.item_name === itemName);
            const unit = match ? match.unit : "item"; 

            // THE DATA OBJECT - We send exactly what the DB expects
            const expenseData = {
                item_name: itemName,
                description: note,
                amount_spent: qty * price,
                quantity_bought: qty,
                unit: unit,
                bought_by: staffName
            };

            const { error } = await _supabase.from('expenses').insert([expenseData]);

            if (error) {
                alert("Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "SUBMIT & UPDATE";
                return;
            }

            // Update Stock if it's a real inventory item
            if (itemName !== "Other" && match) {
                await _supabase.from('inventory').update({ quantity: match.quantity + qty }).eq('item_name', itemName);
            }

            alert("Expense Logged Successfully!");
            location.reload();
        }

        async function placeOrder() {
            alert("Order function triggered.");
        }

        loadInventory();
    </script>
</body>
</html>
