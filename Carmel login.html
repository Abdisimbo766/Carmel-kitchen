<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Kitchen - Staff Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-btn { transition: all 0.3s ease; border-bottom: 2px solid transparent; cursor: pointer; }
        .tab-btn.active { border-bottom: 2px solid #f97316; color: #f97316; }
        input, select { background: rgba(0,0,0,0.4) !important; color: white !important; }
    </style>
</head>
<body class="p-4">

    <div class="fixed inset-0 -z-10 bg-gradient-to-b from-zinc-900 to-black"></div>

    <div class="glass-panel p-8 rounded-[3rem] w-full max-w-md shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic tracking-tighter text-orange-500">CARMEL KITCHEN</h1>
            <p class="text-[10px] text-zinc-500 uppercase tracking-[0.4em] mt-2 font-bold">Staff Portal</p>
        </div>

        <div class="flex mb-8 border-b border-white/5 text-xs font-black uppercase tracking-widest">
            <button onclick="toggleTab('login')" id="login-tab" class="tab-btn active flex-1 py-4">መግቢያ (Login)</button>
            <button onclick="toggleTab('register')" id="reg-tab" class="tab-btn flex-1 py-4 text-zinc-600">መመዝገቢያ (Register)</button>
        </div>

        <div id="login-section" class="space-y-5">
            <div class="space-y-2">
                <label class="text-[10px] text-zinc-500 ml-2 font-bold uppercase">Username</label>
                <input type="text" id="log-user" class="w-full border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-orange-500">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] text-zinc-500 ml-2 font-bold uppercase">Password</label>
                <input type="password" id="log-pass" class="w-full border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-orange-500">
            </div>
            <button onclick="handleLogin()" class="w-full bg-orange-600 hover:bg-orange-500 py-4 rounded-2xl font-black transition-all active:scale-95 text-sm uppercase">ግባ 🚀</button>
        </div>

        <div id="register-section" class="space-y-4 hidden">
            <input type="text" id="reg-name" placeholder="ሙሉ ስም (Full Name)" class="w-full border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-orange-500">
            <input type="text" id="reg-user" placeholder="የተጠቃሚ ስም (Username)" class="w-full border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-orange-500">
            
            <select id="reg-role" class="w-full border border-white/10 p-4 rounded-2xl text-zinc-400 focus:outline-none focus:border-orange-500">
                <option value="cashier.html">ካሸር (Cashier)</option>
                <option value="kitchen.html">ኩሽና (Kitchen)</option>
                <option value="bar.html">ባር (Bar)</option>
                <option value="manager.html">ባለቤት (Manager)</option>
            </select>
            
            <input type="password" id="reg-pass" placeholder="የይለፍ ቃል ፍጠር" class="w-full border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-orange-500">
            
            <div class="pt-2">
                <input type="text" id="admin-code" placeholder="Admin Security Code" 
                    class="w-full border border-orange-500/30 p-4 rounded-2xl text-orange-400 font-bold focus:outline-none">
                <p class="text-[9px] text-orange-500/50 mt-2 text-center italic">* Owner Code Required</p>
            </div>
            
            <button onclick="handleRegister()" class="w-full bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-black transition-all active:scale-95 text-sm uppercase">አካውንት ክፈት ✅</button>
        </div>

        <p id="msg" class="text-center text-[10px] mt-8 font-bold uppercase tracking-widest h-4"></p>
    </div>

    <script>
        const SUPABASE_URL = "https://csdpoyqbkjljaqknunyv.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleTab(type) {
            const isLogin = type === 'login';
            document.getElementById('login-section').classList.toggle('hidden', !isLogin);
            document.getElementById('register-section').classList.toggle('hidden', isLogin);
            document.getElementById('login-tab').classList.toggle('active', isLogin);
            document.getElementById('reg-tab').classList.toggle('active', !isLogin);
            document.getElementById('msg').innerText = "";
        }

        async function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            const role = document.getElementById('reg-role').value;
            const adminCode = document.getElementById('admin-code').value;

            if (adminCode !== "CARMEL@321") {
                alert("የተሳሳተ የባለቤት መለያ ቁጥር ነው!");
                return;
            }

            if(!name || !user || !pass) return alert("እባክዎ ሁሉንም ይሙሉ!");

            // Check if this role is already registered
            const { data: existingRole } = await _supabase
                .from('staff')
                .select('role')
                .eq('role', role)
                .maybeSingle();

            if (existingRole) {
                alert(`ስህተት፦ ለዚህ ክፍል (${role.replace('.html', '')}) አካውንት ቀድሞ ተፈጥሯል!`);
                return;
            }

            const { error } = await _supabase
                .from('staff')
                .insert([{ full_name: name, username: user, password: pass, role: role }]);

            if (error) {
                alert("ስህተት፦ ይህ የተጠቃሚ ስም ተይዟል");
            } else {
                alert("አካውንት ተፈጥሯል! አሁን መግባት ይችላሉ።");
                toggleTab('login');
            }
        }

        async function handleLogin() {
            const user = document.getElementById('log-user').value;
            const pass = document.getElementById('log-pass').value;

            const { data, error } = await _supabase
                .from('staff')
                .select('*')
                .eq('username', user)
                .eq('password', pass)
                .maybeSingle();

            if (data) {
                sessionStorage.setItem('isLogged', 'true');
                window.location.href = data.role; 
            } else {
                document.getElementById('msg').innerText = "የተሳሳተ የተጠቃሚ ስም ወይም የይለፍ ቃል!";
                document.getElementById('msg').className = "text-center text-[10px] mt-8 font-bold uppercase text-red-500";
            }
        }
    </script>
</body>
</html>
