<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel - Kitchen Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .order-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.07); backdrop-filter: blur(10px); border-radius: 2.5rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .order-card:hover { transform: translateY(-5px); border-color: #f97316; background: rgba(249, 115, 22, 0.05); }
        .pulse { animation: pulse-orange 2s infinite; }
        @keyframes pulse-orange { 0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); } 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } }
    </style>
</head>
<body class="p-6 lg:p-12">

    <header class="flex justify-between items-center mb-12 border-b border-white/10 pb-8">
        <div>
            <h1 class="text-5xl font-black italic tracking-tighter text-orange-500 uppercase">Kitchen Orders</h1>
            <p id="staff-name-display" class="text-[10px] text-zinc-500 uppercase tracking-[0.4em] mt-2 font-bold">Chef Loading...</p>
        </div>
        <div class="text-right">
            <div id="status-dot" class="inline-block w-3 h-3 bg-green-500 rounded-full pulse mr-2"></div>
            <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Live Sync Active</span>
        </div>
    </header>

    <div id="orders-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    <script>
        const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");

        // 1. SECURITY & NAME CHECK
        const staffName = sessionStorage.getItem('staffName');
        if (!staffName) {
            window.location.href = "Login.html";
        } else {
            document.getElementById('staff-name-display').innerText = `Chef: ${staffName}`;
        }

        // 2. LOAD ORDERS
        async function loadOrders() {
            const { data: orders, error } = await _supabase
                .from('orders')
                .select('*')
                .eq('status', 'pending')
                .order('created_at', { ascending: true });

            const container = document.getElementById('orders-container');
            container.innerHTML = '';

            if (orders && orders.length > 0) {
                orders.forEach(order => {
                    const items = JSON.parse(order.items_json || '[]');
                    // Only show Food items for Kitchen (Hide drinks if you want specific filtering)
                    container.innerHTML += `
                        <div class="order-card p-8 flex flex-col justify-between h-full">
                            <div>
                                <div class="flex justify-between items-start mb-6">
                                    <span class="text-4xl font-black text-orange-500 opacity-20">#${order.id.toString().slice(-3)}</span>
                                    <span class="text-[10px] font-bold bg-white/5 px-3 py-1 rounded-full uppercase text-zinc-400">${new Date(order.created_at).toLocaleTimeString()}</span>
                                </div>
                                <div class="space-y-4 mb-8">
                                    ${items.map(i => `
                                        <div class="flex justify-between items-center border-b border-white/5 pb-2">
                                            <p class="font-bold text-lg">${i.name}</p>
                                            <p class="text-orange-500 font-black">x${i.quantity}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <button onclick="finishOrder('${order.id}', ${order.items_json})" 
                                class="w-full bg-orange-600 hover:bg-orange-500 py-4 rounded-2xl font-black uppercase text-sm transition-all active:scale-95">
                                Order Ready ✅
                            </button>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-zinc-600 font-bold uppercase tracking-[0.5em]">Waiting for new orders...</div>`;
            }
        }

        // 3. FINISH ORDER & SUBTRACT STOCK
        async function finishOrder(orderId, items) {
            // Update Order Status
            const { error } = await _supabase.from('orders').update({ status: 'done' }).eq('id', orderId);

            if (!error) {
                // Loop through items to subtract from inventory
                for (const item of items) {
                    const name = item.name.toLowerCase();
                    const qty = item.quantity;

                    if (name.includes('burger')) {
                        await updateInventory('Burger Patties', 1 * qty);
                        await updateInventory('Burger Buns', 1 * qty);
                    }
                    if (name.includes('fasting')) {
                        await updateInventory('Burger Buns', 1 * qty);
                        // Add other fasting ingredients if needed
                    }
                }
                loadOrders();
            }
        }

        // Helper to update Supabase Inventory
        async function updateInventory(itemName, amount) {
            const { data } = await _supabase.from('inventory').select('id, quantity').eq('name', itemName).maybeSingle();
            if (data) {
                await _supabase.from('inventory').update({ quantity: data.quantity - amount }).eq('id', data.id);
            }
        }

        // Real-time listener for new orders
        _supabase.channel('kitchen_updates').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, loadOrders).subscribe();

        loadOrders();
    </script>
</body>
</html>
