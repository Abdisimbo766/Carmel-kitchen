<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Kitchen - Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .k-card { animation: pulse 2s infinite; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); }
        @keyframes pulse { 0%, 100% { border-color: rgba(249,115,22,0.2); } 50% { border-color: #f97316; } }
    </style>
</head>
<body class="p-6 bg-black overflow-hidden">
    <video autoplay muted loop class="fixed inset-0 w-full h-full object-cover opacity-30 -z-10">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-chef-cooking-in-a-professional-kitchen-40790-large.mp4" type="video/mp4">
    </video>

    <div class="flex justify-between items-center mb-8 border-b border-orange-500/30 pb-4">
        <h1 class="text-3xl font-black text-orange-500 italic uppercase">KITCHEN ORDERS</h1>
        <div id="staff-badge" class="text-[10px] text-orange-400 font-bold uppercase tracking-widest bg-orange-500/10 px-4 py-1 rounded-full border border-orange-500/20">
            Staff Active
        </div>
    </div>

    <div id="kitchen-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

    <script>
        const SUPABASE_URL = "https://csdpoyqbkjljaqknunyv.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- NEW SECURITY CHECK ---
        async function checkAccess() {
            const loggedInUser = sessionStorage.getItem('staffName');
            
            // Check if account still exists in the database
            const { data, error } = await _supabase
                .from('staff')
                .select('*')
                .eq('full_name', loggedInUser)
                .maybeSingle();

            if (!data || error) {
                alert("የእርስዎ መለያ ተሰርዟል! (Your account has been removed)");
                sessionStorage.clear();
                window.location.href = "Login.html";
                return false;
            }
            return true;
        }

        async function loadKitchen() {
            // Run security check during data load
            const hasAccess = await checkAccess();
            if (!hasAccess) return;

            const { data } = await _supabase
                .from('orders')
                .select('*')
                .eq('status', 'verified')
                .order('created_at', { ascending: true });

            if (data) {
                const grid = document.getElementById('kitchen-grid');
                grid.innerHTML = '';
                
                // Filter out drinks (Bar items)
                const foodItems = data.filter(o => 
                    !o.items.toLowerCase().includes('juice') && 
                    !o.items.toLowerCase().includes('coffee') &&
                    !o.items.toLowerCase().includes('mojito') &&
                    !o.items.toLowerCase().includes('shake')
                );
                
                if (foodItems.length === 0) {
                    grid.innerHTML = '<div class="col-span-full py-20 text-center text-zinc-700 font-black uppercase text-xs tracking-widest">ምንም የታዘዘ ምግብ የለም</div>';
                }

                foodItems.forEach(order => {
                    const div = document.createElement('div');
                    div.className = "p-8 rounded-[2.5rem] border-2 k-card";
                    div.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <p class="text-[10px] text-orange-500 font-bold uppercase">${new Date(order.created_at).toLocaleTimeString()}</p>
                            <span class="bg-orange-600/20 text-orange-500 text-[9px] px-2 py-1 rounded-md font-black uppercase">Food</span>
                        </div>
                        <h2 class="text-2xl font-black mb-8 uppercase leading-tight text-white">${order.items}</h2>
                        <button onclick="markDone('${order.id}')" class="w-full bg-orange-600 hover:bg-orange-500 text-white py-4 rounded-2xl font-bold transition-all active:scale-95">
                            READY ✅
                        </button>
                    `;
                    grid.appendChild(div);
                });
            }
        }

        async function markDone(id) {
            const hasAccess = await checkAccess();
            if (!hasAccess) return;

            await _supabase.from('orders').update({ status: 'done' }).eq('id', id);
            loadKitchen();
        }

        // Real-time Update Listener
        _supabase.channel('kitchen-updates')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => loadKitchen())
            .subscribe();

        // Initial Load
        loadKitchen();
    </script>
</body>
</html>
