<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Cashier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #070A0E; color: #fff; font-family: 'Inter', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 1.5rem; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl font-black italic text-orange-400 uppercase tracking-tighter mb-1">Cashier</h1>
            <p class="text-orange-300 text-sm">Daily operations panel</p>
        </header>

        <!-- Daily Expense (Purchasing) Section -->
        <div class="card p-6 my-8 shadow-lg">
            <h2 class="text-xl font-black text-orange-400 mb-4">Daily Expense (Purchasing)</h2>
            <form id="purchase-form" class="flex flex-col space-y-4">
                <select id="purchase-item" class="p-2 rounded bg-zinc-800 text-white" required>
                    <option value="">-- Select Item --</option>
                </select>
                <input id="purchase-desc" type="text" placeholder="Describe expense (only for 'Other')" class="p-2 rounded bg-zinc-800 text-white hidden">
                <div class="flex space-x-2">
                    <input id="purchase-qty" type="number" min="1" placeholder="Qty" class="p-2 rounded bg-zinc-800 text-white flex-1" required>
                    <input id="purchase-unit" type="text" placeholder="Unit" class="p-2 rounded bg-zinc-800 text-zinc-400 w-24" disabled>
                    <input id="purchase-price" type="number" min="1" placeholder="Unit price" class="p-2 rounded bg-zinc-800 text-white flex-1" required>
                </div>
                <input id="purchase-total" type="number" placeholder="Total Price" class="p-2 rounded bg-zinc-800 text-green-400 font-bold" readonly>
                <button type="submit" class="bg-orange-500 hover:bg-orange-700 text-black font-bold rounded px-4 py-2">Add Purchase</button>
            </form>
            <div id="purchasing-result" class="mt-3 font-bold"></div>
        </div>

        <!-- You can add your other cashier HTML sections below as needed -->

    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    // Replace with your own Supabase URL and public anon key!
    const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");

    // Load inventory for the dropdown, add "Other"
    async function loadInventoryItems() {
        const { data, error } = await _supabase.from('inventory').select('*');
        const sel = document.getElementById('purchase-item');
        sel.innerHTML = `<option value="">-- Select Item --</option>`;
        if (data) {
            data.forEach(item => {
                sel.innerHTML += `<option value="${item.id}" data-unit="${item.unit}">${item.item_name}</option>`;
            });
        }
        sel.innerHTML += `<option value="other" data-unit="">Other (Write Expense Manually)</option>`;
    }
    loadInventoryItems();

    // Show/hide fields & auto-fill unit
    document.getElementById('purchase-item').addEventListener('change', function() {
        const sel = this;
        const unit = sel.options[sel.selectedIndex].getAttribute('data-unit') || '';
        document.getElementById('purchase-unit').value = unit;
        if(sel.value === 'other') {
            document.getElementById('purchase-desc').classList.remove('hidden');
            document.getElementById('purchase-qty').disabled = true;
            document.getElementById('purchase-qty').value = '';
            document.getElementById('purchase-unit').value = '';
        } else {
            document.getElementById('purchase-desc').classList.add('hidden');
            document.getElementById('purchase-qty').disabled = false;
        }
        updateTotal();
    });

    // Total price auto calc
    ['purchase-qty', 'purchase-price'].forEach(id => {
      document.getElementById(id).addEventListener('input', updateTotal);
    });
    function updateTotal() {
      const sel = document.getElementById('purchase-item');
      if(sel.value === 'other') {
        // No qty for other
        const price = Number(document.getElementById('purchase-price').value);
        document.getElementById('purchase-total').value = price > 0 ? price : '';
        return;
      }
      const qty = Number(document.getElementById('purchase-qty').value);
      const price = Number(document.getElementById('purchase-price').value);
      if (qty > 0 && price > 0) {
        document.getElementById('purchase-total').value = qty * price;
      } else {
        document.getElementById('purchase-total').value = '';
      }
    }

    // Handle submit
    document.getElementById('purchase-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const sel = document.getElementById('purchase-item');
        const item_id = sel.value;
        let item_name = sel.options[sel.selectedIndex].textContent;
        const qty = Number(document.getElementById('purchase-qty').value);
        const pricePerUnit = Number(document.getElementById('purchase-price').value);
        const totalPrice = Number(document.getElementById('purchase-total').value);
        const cashierName = "Cashier"; // Update to dynamic if needed
        const description = document.getElementById('purchase-desc').value || '';

        // "Other" logic
        if (item_id === 'other') {
            if (!description || totalPrice < 1 || pricePerUnit < 1) {
                document.getElementById('purchasing-result').innerText = 'Please fill out description and prices.';
                document.getElementById('purchasing-result').className = 'mt-3 font-bold text-red-500';
                return;
            }
            item_name = description;
            // Add expense only, skip inventory
            const { error: expenseError } = await _supabase.from('expenses').insert([
                {
                    item_id: null,
                    item_name,
                    amount_spent: totalPrice,
                    qty: null,
                    unit_price: pricePerUnit,
                    description: '(Other, non-stocked expense)',
                    bought_by: cashierName
                }
            ]);
            if(!expenseError){
                document.getElementById('purchasing-result').innerText = 'Expense Added!';
                document.getElementById('purchasing-result').className = 'mt-3 font-bold text-green-400';
                loadInventoryItems();
                this.reset();
                document.getElementById('purchase-desc').classList.add('hidden');
                document.getElementById('purchase-unit').value = '';
                document.getElementById('purchase-total').value = '';
            } else {
                document.getElementById('purchasing-result').innerText = 'Something went wrong!';
                document.getElementById('purchasing-result').className = 'mt-3 font-bold text-red-500';
            }
            return;
        }

        // Normal item (existing logic)
        if(!item_id || qty < 1 || pricePerUnit < 1) {
            document.getElementById('purchasing-result').innerText = 'Please fill all required fields.';
            document.getElementById('purchasing-result').className = 'mt-3 font-bold text-red-500';
            return;
        }

        // 1. Add expense to expenses table
        const { error: expenseError } = await _supabase.from('expenses').insert([
            {
                item_id,
                item_name,
                amount_spent: totalPrice,
                qty,
                unit_price: pricePerUnit,
                description: 'Purchased for stock',
                bought_by: cashierName
            }
        ]);

        // 2. Update inventory (add qty to stock)
        const { data: existingItem, error: invErr } = await _supabase.from('inventory').select('*').eq('id', item_id).single();
        let newQty = (existingItem?.quantity || 0) + qty;
        const { error: updateErr } = await _supabase.from('inventory').update({ quantity: newQty }).eq('id', item_id);

        // UI Feedback
        if(!expenseError && !updateErr){
            document.getElementById('purchasing-result').innerText = 'Expense Added, Stock Updated!';
            document.getElementById('purchasing-result').className = 'mt-3 font-bold text-green-400';
            loadInventoryItems();
            this.reset();
            document.getElementById('purchase-unit').value = '';
            document.getElementById('purchase-total').value = '';
        } else {
            document.getElementById('purchasing-result').innerText = 'Something went wrong!';
            document.getElementById('purchasing-result').className = 'mt-3 font-bold text-red-500';
        }
    });
    </script>
</body>
</html>
