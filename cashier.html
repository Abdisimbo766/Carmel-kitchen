<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Cashier Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .input-field { background: #111; border: 1px solid rgba(255, 255, 255, 0.1); padding: 0.75rem; border-radius: 0.75rem; font-size: 0.875rem; width: 100%; color: white; }
        .suggestion-box { background: #111; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 0.75rem; max-height: 250px; overflow-y: auto; position: absolute; width: 100%; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .suggestion-item { padding: 0.85rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; display: flex; justify-content: space-between; }
        .suggestion-item:hover { background: #f97316; color: black; font-weight: bold; }
        .btn-confirm { background: #fff; color: #000; font-weight: 900; transition: 0.3s; }
        .btn-confirm:hover { background: #f97316; color: #fff; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-orange-500/20 pb-4">
            <div>
                <h1 class="text-3xl font-black italic text-orange-500 uppercase">CARMEL CASHIER</h1>
                <p id="staff-name-display" class="text-[10px] text-zinc-500 font-bold uppercase"></p>
            </div>
            <div class="flex gap-6 items-center">
                <div class="text-right">
                    <p id="daily-count" class="text-xl font-black text-white">0</p>
                    <p class="text-[9px] text-zinc-500 uppercase font-black">Total Orders</p>
                </div>
                <div class="text-right">
                    <p id="daily-money" class="text-xl font-black text-orange-500">0 Birr</p>
                    <p class="text-[9px] text-zinc-500 uppercase font-black">Revenue</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-1">
                <h2 class="text-xs font-black uppercase text-white mb-4 ml-2 tracking-widest">Walk-in Order</h2>
                <div class="card p-6 border-white/10 relative">
                    <div class="space-y-4">
                        <div class="relative">
                            <p class="text-[10px] text-zinc-500 mb-1 ml-1 uppercase">Search Full Menu</p>
                            <input id="menu-search" type="text" placeholder="Type item name..." class="input-field" oninput="searchMenu()" autocomplete="off">
                            <div id="suggestions" class="suggestion-box hidden"></div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <p class="text-[10px] text-zinc-500 mb-1 ml-1 uppercase">Qty</p>
                                <input id="manual-qty" type="number" value="1" oninput="updateManualTotal()" class="input-field">
                            </div>
                            <div>
                                <p class="text-[10px] text-zinc-500 mb-1 ml-1 uppercase">Price</p>
                                <input id="manual-price" type="number" readonly class="input-field opacity-50">
                            </div>
                        </div>

                        <div id="manual-total-display" class="bg-orange-500/10 p-4 rounded-xl text-center text-xl font-black text-orange-500 border border-orange-500/20">0 Birr</div>
                        
                        <button onclick="createManualOrder()" class="w-full bg-orange-500 text-black font-black py-4 rounded-xl uppercase text-xs tracking-widest shadow-lg">Confirm & Send</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <h2 class="text-xs font-black uppercase text-orange-500 mb-4 ml-2 tracking-widest">Incoming Orders</h2>
                <div id="order-queue" class="space-y-4"></div>
            </div>

            <div class="lg:col-span-1">
                <h2 class="text-xs font-black uppercase text-zinc-500 mb-4 ml-2 tracking-widest">Log Expense</h2>
                <div class="card p-6 border-white/5">
                    <div class="space-y-3">
                        <select id="exp-item-select" class="input-field"></select>
                        <div class="grid grid-cols-3 gap-1">
                            <input id="exp-qty" type="number" placeholder="Qty" class="input-field">
                            <select id="exp-unit-select" class="input-field">
                                <option value="pcs">pcs</option><option value="kg">kg</option><option value="liter">ltr</option>
                            </select>
                            <input id="exp-price" type="number" placeholder="Price" class="input-field">
                        </div>
                        <button onclick="logPurchase()" class="w-full bg-zinc-800 text-white font-black py-3 rounded-xl uppercase text-[10px]">Save Expense</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <h2 class="text-xs font-black uppercase text-zinc-500 mb-4 ml-2 tracking-widest">Daily Sales</h2>
                <div class="card p-4 h-[600px] overflow-y-auto">
                    <table class="w-full text-left text-[11px]">
                        <tbody id="sales-table-body" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");
        const staffName = sessionStorage.getItem('staffName') || 'Cashier';
        document.getElementById('staff-name-display').innerText = `Logged In: ${staffName}`;

        // FULL CARMEL MENU DATA
        const carmelMenu = [
            // JUICES
            { name: "Avocado Juice", price: 120 },
            { name: "Mango Juice", price: 110 },
            { name: "Papaya Juice", price: 100 },
            { name: "Pineapple Juice", price: 130 },
            { name: "Mixed Juice", price: 140 },
            // MOJITOS
            { name: "Strawberry Mojito", price: 140 },
            { name: "Blueberry Mojito", price: 150 },
            { name: "Passion Fruit Mojito", price: 140 },
            { name: "Classic Mint Mojito", price: 120 },
            // SHAKES
            { name: "Carmel Special Shake", price: 180 },
            { name: "Chocolate Milkshake", price: 130 },
            { name: "Vanilla Milkshake", price: 130 },
            { name: "Oreo Shake", price: 160 },
            // COFFEE & TEA
            { name: "Jebena Coffee", price: 35 },
            { name: "Macchiato", price: 45 },
            { name: "Cafe Latte", price: 70 },
            { name: "Cappuccino", price: 80 },
            { name: "Tea", price: 25 },
            { name: "Special Tea", price: 40 },
            // FOOD
            { name: "House Special Burger", price: 280 },
            { name: "Chicken Sandwich", price: 220 },
            { name: "Club Sandwich", price: 250 },
            { name: "French Fries", price: 90 }
        ];

        let selectedItem = null;
        let dailySales = JSON.parse(localStorage.getItem('carmel_sales_list')) || [];

        function searchMenu() {
            const query = document.getElementById('menu-search').value.toLowerCase();
            const suggestionBox = document.getElementById('suggestions');
            suggestionBox.innerHTML = '';
            if (query.length < 1) { suggestionBox.classList.add('hidden'); return; }

            const matches = carmelMenu.filter(item => item.name.toLowerCase().includes(query));
            if (matches.length > 0) {
                matches.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = `<span>${item.name}</span> <span class="text-orange-500 font-bold">${item.price} ETB</span>`;
                    div.onclick = () => selectItem(item);
                    suggestionBox.appendChild(div);
                });
                suggestionBox.classList.remove('hidden');
            } else { suggestionBox.classList.add('hidden'); }
        }

        function selectItem(item) {
            selectedItem = item;
            document.getElementById('menu-search').value = item.name;
            document.getElementById('manual-price').value = item.price;
            document.getElementById('suggestions').classList.add('hidden');
            updateManualTotal();
        }

        function updateManualTotal() {
            const qty = document.getElementById('manual-qty').value || 0;
            const price = document.getElementById('manual-price').value || 0;
            document.getElementById('manual-total-display').innerText = `${qty * price} Birr`;
        }

        async function createManualOrder() {
            if(!selectedItem) return alert("Select an item first");
            const qty = parseInt(document.getElementById('manual-qty').value);
            const total = qty * selectedItem.price;
            const { error } = await _supabase.from('orders').insert([{ item_name: selectedItem.name, quantity: qty, total_price: total, status: 'done' }]);
            if(!error) {
                dailySales.push({ time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), item: selectedItem.name, qty, price: total });
                updateUI();
                document.getElementById('menu-search').value = "";
                selectedItem = null;
                updateManualTotal();
            }
        }

        async function confirmOrder(id, item, qty, price) {
            const { error } = await _supabase.from('orders').update({ status: 'done' }).eq('id', id);
            if(!error) {
                dailySales.push({ time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), item, qty, price });
                updateUI();
                fetchOrders();
            }
        }

        async function fetchOrders() {
            const { data } = await _supabase.from('orders').select('*').eq('status', 'pending');
            const queue = document.getElementById('order-queue');
            queue.innerHTML = '';
            if (data) data.forEach(order => {
                queue.innerHTML += `
                    <div class="card p-4 border-orange-500/20">
                        <p class="font-black uppercase">${order.item_name}</p>
                        <p class="text-xs text-orange-500">${order.quantity} pcs — ${order.total_price} Birr</p>
                        <button onclick="confirmOrder('${order.id}', '${order.item_name}', ${order.quantity}, ${order.total_price})" class="w-full mt-3 btn-confirm py-2 rounded-lg uppercase text-[10px]">Confirm Order</button>
                    </div>`;
            });
        }

        function updateUI() {
            const table = document.getElementById('sales-table-body');
            table.innerHTML = '';
            let totalMoney = 0;
            dailySales.forEach(s => {
                totalMoney += s.price;
                table.innerHTML = `<tr><td class="py-3 font-bold uppercase">${s.item}</td><td>${s.qty}</td><td class="text-orange-500 font-black text-right">${s.price}</td></tr>` + table.innerHTML;
            });
            document.getElementById('daily-count').innerText = dailySales.length;
            document.getElementById('daily-money').innerText = `${totalMoney} Birr`;
            localStorage.setItem('carmel_sales_list', JSON.stringify(dailySales));
        }

        async function loadInventory() {
            const { data } = await _supabase.from('inventory').select('item_name');
            const select = document.getElementById('exp-item-select');
            select.innerHTML = '<option value="">-- Stock Item --</option>';
            if(data) data.forEach(i => select.innerHTML += `<option value="${i.item_name}">${i.item_name}</option>`);
        }

        async function logPurchase() {
            const item = document.getElementById('exp-item-select').value;
            const qty = parseFloat(document.getElementById('exp-qty').value);
            const unit = document.getElementById('exp-unit-select').value;
            const price = parseFloat(document.getElementById('exp-price').value);
            if(!item || !qty || !price) return;
            const { error } = await _supabase.from('expenses').insert([{ item_name: item, amount_spent: qty * price, quantity_bought: qty, unit: unit, bought_by: staffName }]);
            if(!error) location.reload();
        }

        updateUI();
        loadInventory();
        fetchOrders();
        setInterval(fetchOrders, 5000);
    </script>
</body>
</html>
