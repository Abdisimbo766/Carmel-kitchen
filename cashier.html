<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carmel Cashier Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-slate-50 p-4 pb-24">

<!-- SEARCH -->
<div class="max-w-4xl mx-auto mb-4">
    <input id="searchBox" oninput="loadOrders()" 
    class="w-full p-3 rounded-xl border"
    placeholder="Search orders, items, queue no...">
</div>

<!-- READY TRAY -->
<div id="ready-tray" class="max-w-4xl mx-auto mb-6 flex flex-wrap gap-3"></div>

<!-- DAILY STATS -->
<div class="max-w-4xl mx-auto grid grid-cols-2 gap-3 mb-6">

    <div class="bg-white p-4 rounded-2xl shadow">
        <p class="text-xs text-gray-400">Sales</p>
        <p id="sales" class="text-green-600 font-black text-xl">0</p>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow">
        <p class="text-xs text-gray-400">Expense</p>
        <p id="expense" class="text-red-500 font-black text-xl">0</p>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow col-span-2">
        <p class="text-xs text-gray-400">Net Profit</p>
        <p id="profit" class="text-blue-600 font-black text-xl">0</p>
    </div>

</div>

<!-- ORDERS -->
<div class="max-w-4xl mx-auto">
    <h1 class="font-black text-xl mb-3">Pending Orders</h1>
    <div id="pending-list" class="space-y-3"></div>
</div>

<script>

const SUPABASE_URL="https://csdpoyqbkjljaqknunyv.supabase.co";
const SUPABASE_KEY="sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ---------------- HELPERS ---------------- */
function clean(v){ return v && v!=="null" && v!=="EMPTY" ? v : ""; }

/* ---------------- SCREENSHOT ---------------- */
function viewScreenshot(url){
    window.open(url,'_blank');
}

/* ---------------- CANCEL ---------------- */
async function cancelOrder(id){
    if(!confirm("Cancel order?")) return;
    await supabaseClient.from("orders").update({status:"cancelled"}).eq("id",id);
    loadOrders();
}

/* ---------------- VERIFY ---------------- */
async function verifyOrder(id){
    await supabaseClient.from("orders").update({status:"verified"}).eq("id",id);
    loadOrders();
}

/* ---------------- LOAD ORDERS ---------------- */
async function loadOrders(){

    let search = document.getElementById("searchBox").value.toLowerCase();

    let {data} = await supabaseClient
        .from("orders")
        .select("*")
        .eq("status","pending");

    let list = document.getElementById("pending-list");
    list.innerHTML="";

    let totalSales = 0;
    let itemStats = {};

    if(data){

        data.forEach(o=>{

            let text = (o.food_list + o.drink_list + o.items).toLowerCase();

            if(search && !text.includes(search) && !o.queue_no.includes(search)) return;

            totalSales += Number(o.total_price || 0);

            // ITEM TRACK
            let items = clean(o.food_list)+","+clean(o.drink_list)+","+clean(o.items);
            items.split(",").forEach(i=>{
                i=i.trim();
                if(!i) return;
                itemStats[i] = (itemStats[i]||0)+1;
            });

            let div = document.createElement("div");
            div.className="bg-white p-4 rounded-xl shadow";

            div.innerHTML=`
                <div class="flex justify-between">
                    <b>#${o.queue_no}</b>
                    <span class="text-green-600">${o.total_price} Birr</span>
                </div>

                <p class="text-sm mt-1">${o.items || ""}</p>

                <p class="text-xs text-gray-500">Payment: ${o.payment_method || "Cash"}</p>

                <p class="text-xs text-blue-500">Note: ${o.order_note || "-"}</p>

                ${o.payment_screenshot ? 
                    `<img onclick="viewScreenshot('${o.payment_screenshot}')"
                    src="${o.payment_screenshot}" class="h-32 w-full object-cover rounded mt-2 cursor-pointer">`
                    : ""}

                ${o.receipt_url ?
                    `<a href="${o.receipt_url}" target="_blank" class="text-xs text-purple-600">View Receipt</a>` : ""}

                <div class="flex gap-2 mt-2">
                    <button onclick="verifyOrder('${o.id}')" class="bg-green-600 text-white px-3 py-1 rounded">✔</button>
                    <button onclick="cancelOrder('${o.id}')" class="bg-red-600 text-white px-3 py-1 rounded">✖</button>
                </div>
            `;

            list.appendChild(div);
        });
    }

    // update stats
    document.getElementById("sales").innerText = totalSales + " Birr";
    document.getElementById("expense").innerText = getExpense() + " Birr";
    document.getElementById("profit").innerText = (totalSales - getExpense()) + " Birr";

}

/* ---------------- EXPENSE ---------------- */
function getExpense(){
    let exp = JSON.parse(localStorage.getItem("expense")||"0");
    return exp || 0;
}

/* ---------------- READY ORDERS ---------------- */
async function loadReady(){
    let {data} = await supabaseClient.from("orders").select("*").eq("status","ready");

    let tray=document.getElementById("ready-tray");
    tray.innerHTML="";

    if(data){
        data.forEach(o=>{
            let el=document.createElement("div");
            el.className="bg-green-600 text-white px-3 py-1 rounded-full";
            el.innerHTML=`#${o.queue_no} Ready`;
            tray.appendChild(el);
        });
    }
}

/* ---------------- REALTIME ---------------- */
supabaseClient.channel("orders")
.on("postgres_changes",{event:"*",schema:"public",table:"orders"},()=>{
    loadOrders();
    loadReady();
})
.subscribe();

/* ---------------- INIT ---------------- */
loadOrders();
loadReady();

</script>

</body>
</html>
