<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel - Cashier Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 2.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 p-4 pb-24">

    <div id="ready-tray" class="max-w-4xl mx-auto mb-6 flex flex-wrap gap-3"></div>

    <div class="max-w-4xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="glass-card p-6">
                <h2 class="text-slate-400 text-[10px] uppercase font-black tracking-widest mb-1">የዛሬ ጠቅላላ ሽያጭ</h2>
                <div class="flex justify-between items-end">
                    <p id="daily-total" class="text-4xl font-black text-green-600">0 Birr</p>
                    <button onclick="openSummary()" class="text-[10px] bg-slate-100 px-3 py-2 rounded-xl font-bold hover:bg-slate-200">ሪፖርት አሳይ 📊</button>
                </div>
            </div>
            
            <div class="glass-card p-6">
                <h2 class="text-slate-400 text-[10px] uppercase font-black tracking-widest mb-3">የተሸጡ ምግቦች ዝርዝር</h2>
                <div id="item-stats-list" class="flex flex-wrap gap-2 max-h-[100px] overflow-y-auto custom-scrollbar">
                    <p class="text-slate-400 text-xs italic">ሽያጭ የለም...</p>
                </div>
            </div>
        </div>

        <div class="glass-card p-6 mb-8 border-l-8 border-l-red-500">
            <h2 class="text-slate-800 text-sm font-black uppercase mb-4 flex items-center gap-2">💸 የዕለት ወጪ መመዝገቢያ (Expenses)</h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <select id="ex-item" class="bg-slate-100 p-3 rounded-xl text-sm outline-none focus:ring-2 ring-red-400 appearance-none">
                    <option value="" disabled selected>የሚገዛ ዕቃ ይምረጡ (Stock Item)</option>
                    <optgroup label="Daily Essentials">
                        <option value="Milk (ወተት)">Milk (ወተት)</option>
                        <option value="Sugar (ስኳር)">Sugar (ስኳር)</option>
                        <option value="Coffee Beans (ቡና)">Coffee Beans (ቡና)</option>
                        <option value="Tea Leaves (ሻይ ቅጠል)">Tea Leaves (ሻይ ቅጠል)</option>
                        <option value="Injera (እንጀራ)">Injera (እንጀራ)</option>
                    </optgroup>
                    <optgroup label="Kitchen Stock">
                        <option value="Beef (የበሬ ስጋ)">Beef (የበሬ ስጋ)</option>
                        <option value="Chicken (የዶሮ ስጋ)">Chicken (የዶሮ ስጋ)</option>
                        <option value="Burger Bun (ዳቦ)">Burger Bun (ዳቦ)</option>
                        <option value="Oil (ዘይት)">Oil (ዘይት)</option>
                        <option value="Flour (ዱቄት)">Flour (ዱቄት)</option>
                    </optgroup>
                    <optgroup label="Fruits">
                        <option value="Avocado (አቮካዶ)">Avocado (አቮካዶ)</option>
                        <option value="Mango (ማንጎ)">Mango (ማንጎ)</option>
                        <option value="Strawberry (ስትሮቤሪ)">Strawberry (ስትሮቤሪ)</option>
                    </optgroup>
                </select>
