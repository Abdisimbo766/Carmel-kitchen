<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel - Cashier Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
    </style>
</head>

<body class="bg-slate-50 p-4 pb-24">

<!-- ================= READY TRAY ================= -->
<div id="ready-tray" class="max-w-4xl mx-auto mb-6 flex flex-wrap gap-3"></div>

<div class="max-w-4xl mx-auto">

    <!-- ================= EXPENSE SYSTEM (NEW ADDITION) ================= -->
    <div class="bg-white p-6 rounded-3xl shadow mb-6 border">
        <h2 class="font-black text-orange-500 mb-3">💰 Daily Expense (Purchasing)</h2>

        <select id="expense-item" class="w-full p-2 bg-slate-100 rounded mb-2">
            <option value="">Select Inventory Item</option>
        </select>

        <input id="expense-desc" class="w-full p-2 bg-slate-100 rounded mb-2 hidden"
               placeholder="Write description (for Other)" />

        <div class="flex gap-2">
            <input id="expense-qty" type="number" placeholder="Qty" class="w-1/2 p-2 bg-slate-100 rounded">
            <input id="expense-price" type="number" placeholder="Price" class="w-1/2 p-2 bg-slate-100 rounded">
        </div>

        <input id="expense-total" readonly class="w-full p-2 bg-green-100 rounded mt-2" placeholder="Total">

        <button onclick="addExpense()" class="w-full bg-orange-500 text-white py-2 rounded mt-3 font-bold">
            Add Expense
        </button>

        <p id="expense-msg" class="text-sm mt-2"></p>
    </div>
    <!-- ================= END EXPENSE SYSTEM ================= -->


    <!-- ================= SALES ================= -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
            <h2 class="text-slate-400 text-[10px] uppercase font-black tracking-widest mb-1">የዛሬ ጠቅላላ ሽያጭ</h2>
            <div class="flex justify-between items-end">
                <p id="daily-total" class="text-4xl font-black text-green-600">0 Birr</p>
                <button onclick="openSummary()" class="text-[10px] bg-slate-100 px-3 py-2 rounded-xl font-bold hover:bg-slate-200">ሪፖርት 📊</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
            <h2 class="text-slate-400 text-[10px] uppercase font-black tracking-widest mb-3">የተሸጡ ምግቦች</h2>
            <div id="item-stats-list" class="flex flex-wrap gap-2 max-h-[100px] overflow-y-auto custom-scrollbar">
                <p class="text-slate-400 text-xs italic">ሽያጭ የለም...</p>
            </div>
        </div>

    </div>

    <!-- ================= ORDERS ================= -->
    <h1 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-2">
        <span>🔔 በመጠባበቅ ላይ ያሉ ትዕዛዞች</span>
        <span id="pending-badge" class="bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full">0</span>
    </h1>

    <div id="pending-list" class="space-y-4"></div>
</div>


<!-- ================= SUMMARY MODAL ================= -->
<div id="summaryModal" class="fixed inset-0 bg-black/80 hidden">
    <div class="bg-white m-10 p-6 rounded-2xl">
        <h2 class="font-black mb-3">Daily Summary</h2>
        <p>Total: <span id="total-sales"></span></p>
        <p>Orders: <span id="order-count"></span></p>
        <button onclick="closeSummary()" class="mt-3 bg-black text-white px-4 py-2 rounded">Close</button>
    </div>
</div>


<script>
// ================= SUPABASE =================
const SUPABASE_URL = "https://icubeupnkfulidmtiqsz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIs...";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ================= CLEAN =================
function cleanValue(val){
    return (val && val !== "EMPTY" && val !== "null") ? val : "";
}

// ================= EXPENSE SYSTEM (NEW LOGIC) =================

// load inventory
async function loadInventory(){
    const { data } = await supabaseClient.from('inventory').select('*');
    const sel = document.getElementById("expense-item");

    sel.innerHTML = `<option value="">Select Inventory Item</option>`;

    if(data){
        data.forEach(i=>{
            sel.innerHTML += `<option value="${i.id}" data-name="${i.item_name}">${i.item_name}</option>`;
        });
    }

    sel.innerHTML += `<option value="other">Other</option>`;
}

loadInventory();

// toggle other
document.getElementById("expense-item").addEventListener("change", function(){
    if(this.value === "other"){
        document.getElementById("expense-desc").classList.remove("hidden");
    } else {
        document.getElementById("expense-desc").classList.add("hidden");
    }
});

// auto total
document.getElementById("expense-qty").addEventListener("input", calcExpense);
document.getElementById("expense-price").addEventListener("input", calcExpense);

function calcExpense(){
    let q = +document.getElementById("expense-qty").value;
    let p = +document.getElementById("expense-price").value;
    document.getElementById("expense-total").value = q*p || "";
}

// add expense
async function addExpense(){
    let id = document.getElementById("expense-item").value;
    let qty = +document.getElementById("expense-qty").value;
    let price = +document.getElementById("expense-price").value;
    let total = qty * price;
    let desc = document.getElementById("expense-desc").value;

    let name = "";

    if(id === "other"){
        name = desc;
    } else {
        let opt = document.querySelector(`#expense-item option[value="${id}"]`);
        name = opt?.dataset.name;
    }

    const { error } = await supabaseClient.from("expenses").insert([{
        item_id: id === "other" ? null : id,
        item_name: name,
        qty,
        unit_price: price,
        total
    }]);

    if(!error){
        document.getElementById("expense-msg").innerText = "Expense Added!";
        document.getElementById("expense-msg").style.color = "green";
    } else {
        document.getElementById("expense-msg").innerText = "Error adding expense";
        document.getElementById("expense-msg").style.color = "red";
    }
}

// ================= SALES UI =================
function updateSalesUI(){
    const today = new Date().toLocaleDateString();
    const data = JSON.parse(localStorage.getItem("carmel_daily_log")) || {};
    const stats = data[today] || { total:0, itemsSold:{} };

    document.getElementById("daily-total").innerText = stats.total + " Birr";

    let box = document.getElementById("item-stats-list");
    box.innerHTML = Object.entries(stats.itemsSold || {}).map(([k,v])=>
        `<span class="bg-gray-200 px-2 py-1 rounded">${k} ${v}</span>`
    ).join("");
}

// ================= ORDERS =================
async function loadOrders(){
    const { data } = await supabaseClient.from("orders").select("*").eq("status","pending");

    let list = document.getElementById("pending-list");
    list.innerHTML = "";

    if(data){
        document.getElementById("pending-badge").innerText = data.length;

        data.forEach(o=>{
            list.innerHTML += `
            <div class="bg-white p-4 rounded-xl shadow">
                <div class="flex justify-between">
                    <b>#${o.queue_no}</b>
                    <span>${o.total_price} Birr</span>
                </div>

                <p>${cleanValue(o.food_list)}</p>

                ${o.payment_screenshot ?
                    `<img src="${o.payment_screenshot}" class="w-full mt-2 rounded">`
                : ""}

                <button onclick="verifyOrder('${o.id}','${o.total_price}')" class="bg-green-600 text-white px-3 py-1 mt-2 rounded">
                    Verify
                </button>
            </div>`;
        });
    }
}

async function verifyOrder(id,price){
    await supabaseClient.from("orders").update({status:"verified"}).eq("id",id);
    loadOrders();
}

// ================= INIT =================
loadOrders();
</script>

</body>
</html>
