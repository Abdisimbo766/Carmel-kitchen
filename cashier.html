<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel - Cashier Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white p-6">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-orange-500/20 pb-6">
            <div>
                <h1 class="text-3xl font-black text-orange-500 italic uppercase">CASHIER HUB</h1>
                <p id="sales-today" class="text-xs font-bold text-green-400 mt-1 uppercase tracking-[0.2em]">Today: 0 Birr</p>
            </div>
            <div class="flex gap-4">
                <button onclick="window.location.href='stock.html'" class="text-[10px] bg-white/5 border border-white/10 px-4 py-2 rounded-xl font-bold uppercase">Stock Control</button>
                <button onclick="closeDay()" class="bg-red-600/20 text-red-500 border border-red-500/30 px-6 py-2 rounded-full font-bold text-xs uppercase tracking-tighter">Close Day</button>
            </div>
        </header>

        <div id="orders-list" class="grid gap-4">
            </div>
    </div>

    <script>
        const SUPABASE_URL = "https://csdpoyqbkjljaqknunyv.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- SECURITY CHECK ---
        async function checkCashierAccess() {
            const loggedInUser = sessionStorage.getItem('staffName');
            
            const { data, error } = await _supabase
                .from('staff')
                .select('*')
                .eq('full_name', loggedInUser)
                .maybeSingle();

            if (!data || error) {
                alert("የካሸር መለያዎ ተሰርዟል! (Cashier account removed)");
                sessionStorage.clear();
                window.location.href = "Login.html";
                return false;
            }
            return true;
        }

        async function loadPending() {
            const hasAccess = await checkCashierAccess();
            if (!hasAccess) return;

            const { data } = await _supabase
                .from('orders')
                .select('*')
                .eq('status', 'verified')
                .order('created_at', { ascending: false });

            if (data) {
                const list = document.getElementById('orders-list');
                list.innerHTML = '';
                
                // Load Total Sales for the day
                const { data: allSales } = await _supabase.from('orders').select('total_price').eq('status', 'done');
                let total = 0;
                if(allSales) allSales.forEach(s => total += s.total_price);
                document.getElementById('sales-today').innerText = `Today: ${total} Birr`;

                if (data.length === 0) {
                    list.innerHTML = '<p class="text-center py-20 text-zinc-600 font-bold uppercase text-xs tracking-widest">ምንም የሚከፈል ትዕዛዝ የለም</p>';
                }

                data.forEach(order => {
                    const div = document.createElement('div');
                    div.className = "bg-zinc-900/50 p-6 rounded-[2.5rem] border border-white/5 flex justify-between items-center";
                    div.innerHTML = `
                        <div>
                            <p class="text-lg font-black text-white uppercase tracking-tighter">${order.items}</p>
                            <p class="text-xs text-orange-400 font-bold">${order.total_price} Birr • ${order.payment_method}</p>
                        </div>
                        <button onclick="finishOrder('${order.id}')" class="bg-green-600 hover:bg-green-500 px-8 py-3 rounded-2xl font-black transition-all active:scale-95">
                            ተከፍሏል ✅
                        </button>
                    `;
                    list.appendChild(div);
                });
            }
        }

        async function finishOrder(id) {
            const hasAccess = await checkCashierAccess();
            if (!hasAccess) return;

            await _supabase.from('orders').update({ status: 'done' }).eq('id', id);
            loadPending();
        }

        async function closeDay() {
            const code = prompt("Enter 2026 to clear daily sales:");
            if(code === "2026") {
                await _supabase.from('orders').delete().eq('status', 'done');
                alert("Daily history cleared!");
                loadPending();
            }
        }

        // Real-time Update Listener
        _supabase.channel('cashier-updates')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => loadPending())
            .subscribe();

        // Initial Load
        loadPending();
    </script>
</body>
</html>
