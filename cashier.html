<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel - Cashier Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 2.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 p-4 pb-24">

    <div id="ready-tray" class="max-w-4xl mx-auto mb-6 flex flex-wrap gap-3"></div>

    <div class="max-w-4xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="glass-card p-6">
                <h2 class="text-slate-400 text-[10px] uppercase font-black tracking-widest mb-1">የዛሬ ጠቅላላ ሽያጭ</h2>
                <div class="flex justify-between items-end">
                    <p id="daily-total" class="text-4xl font-black text-green-600">0 Birr</p>
                    <button onclick="openSummary()" class="text-[10px] bg-slate-100 px-3 py-2 rounded-xl font-bold hover:bg-slate-200">ሪፖርት አሳይ 📊</button>
                </div>
            </div>
            
            <div class="glass-card p-6">
                <h2 class="text-slate-400 text-[10px] uppercase font-black tracking-widest mb-3">የተሸጡ ምግቦች ዝርዝር</h2>
                <div id="item-stats-list" class="flex flex-wrap gap-2 max-h-[100px] overflow-y-auto custom-scrollbar">
                    <p class="text-slate-400 text-xs italic">ሽያጭ የለም...</p>
                </div>
            </div>
        </div>

        <div class="glass-card p-6 mb-8 border-l-8 border-l-red-500">
            <h2 class="text-slate-800 text-sm font-black uppercase mb-4 flex items-center gap-2">💸 የዕለት ወጪ መመዝገቢያ (Expenses)</h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <select id="ex-item" class="bg-slate-100 p-3 rounded-xl text-sm outline-none focus:ring-2 ring-red-400 appearance-none">
                    <option value="" disabled selected>ዕቃ ይምረጡ (Select Item)</option>
                    <optgroup label="Juices & Shakes">
                        <option value="Carmel Special Shake">Carmel Special Shake</option>
                        <option value="Avocado Juice">Avocado Juice</option>
                        <option value="Mango Juice">Mango Juice</option>
                        <option value="Papaya Juice">Papaya Juice</option>
                        <option value="Mixed Juice">Mixed Juice</option>
                        <option value="Strawberry Milkshake">Strawberry Milkshake</option>
                        <option value="Chocolate Milkshake">Chocolate Milkshake</option>
                    </optgroup>
                    <optgroup label="Food Items">
                        <option value="Carmel Burger">Carmel Burger</option>
                        <option value="Beef Burger">Beef Burger</option>
                        <option value="Chicken Burger">Chicken Burger</option>
                        <option value="Fasting Burger">Fasting Burger</option>
                        <option value="Special Firfir">Special Firfir</option>
                        <option value="Fatira">Fatira</option>
                        <option value="Chachabesa">Chachabesa</option>
                    </optgroup>
                    <optgroup label="Hot Drinks">
                        <option value="Jebena Coffee">Jebena Coffee</option>
                        <option value="Macchiato">Macchiato</option>
                        <option value="Tea">Tea</option>
                    </optgroup>
                    <optgroup label="Other Expenses">
                        <option value="Water/Soft Drinks">Water/Soft Drinks</option>
                        <option value="Raw Materials">Raw Materials (Milk, Sugar, etc.)</option>
                        <option value="Shop Supplies">Shop Supplies</option>
                        <option value="Other">Other</option>
                    </optgroup>
                </select>
                <input id="ex-qty" type="number" placeholder="ብዛት (Qty)" class="bg-slate-100 p-3 rounded-xl text-sm outline-none focus:ring-2 ring-red-400">
                <input id="ex-price" type="number" placeholder="ጠቅላላ ዋጋ (Total Cost)" class="bg-slate-100 p-3 rounded-xl text-sm outline-none focus:ring-2 ring-red-400">
            </div>
            <button onclick="saveExpense()" class="w-full mt-3 bg-red-600 text-white py-3 rounded-xl font-black text-sm hover:bg-red-700 transition-all">ወጪ መዝግብ & ለሥራ አስኪያጅ ላክ</button>
        </div>

        <h1 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-2">
            <span>🔔 በመጠባበቅ ላይ ያሉ ትዕዛዞች</span>
            <span id="pending-badge" class="bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full">0</span>
        </h1>

        <div id="pending-list" class="space-y-4"></div>
    </div>

    <div id="summaryModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-md rounded-[3rem] p-8 border border-white/10 shadow-2xl">
            <h2 class="text-orange-500 font-black text-center text-xl mb-6">የዛሬ የሽያጭ ማጠቃለያ</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white/5 p-4 rounded-3xl text-center">
                    <p class="text-gray-400 text-[10px] uppercase mb-1">ጠቅላላ ሽያጭ</p>
                    <p id="total-sales" class="text-xl font-black text-green-400">0 ETB</p>
                </div>
                <div class="bg-white/5 p-4 rounded-3xl text-center">
                    <p class="text-gray-400 text-[10px] uppercase mb-1">የትዕዛዝ ብዛት</p>
                    <p id="order-count" class="text-xl font-black text-white">0</p>
                </div>
            </div>
            <button id="details-btn" onclick="toggleDetails()" class="w-full py-3 text-gray-400 font-bold text-sm">ዝርዝር አሳይ ⬇️</button>
            <div id="details-section" class="hidden mb-6 max-h-60 overflow-y-auto custom-scrollbar pr-2 text-white">
                <div id="sales-items-list" class="space-y-2"></div>
            </div>
            <div class
