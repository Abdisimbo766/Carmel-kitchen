<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Cashier Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .input-field { background: #111; border: 1px solid rgba(255, 255, 255, 0.1); padding: 0.75rem; border-radius: 0.75rem; font-size: 0.875rem; width: 100%; color: white; }
        .suggestion-box { background: #111; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 0.75rem; max-height: 300px; overflow-y: auto; position: absolute; width: 100%; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .suggestion-item { padding: 0.85rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; display: flex; justify-content: space-between; }
        .suggestion-item:hover { background: #f97316; color: black; font-weight: bold; }
        .category-tag { font-size: 10px; background: rgba(249, 115, 22, 0.1); color: #f97316; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-orange-500/20 pb-4">
            <div>
                <h1 class="text-3xl font-black italic text-orange-500 uppercase">CARMEL CASHIER</h1>
                <p id="staff-name-display" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest"></p>
            </div>
            <div class="text-right">
                <p id="daily-money" class="text-2xl font-black text-orange-500">0 Birr</p>
                <p class="text-[10px] text-zinc-500 uppercase font-black tracking-tighter">Daily Revenue</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-1">
                <h2 class="text-xs font-black uppercase text-white mb-4 ml-2 tracking-widest">Manual Order</h2>
                <div class="card p-6 border-white/10 relative bg-white/[0.01]">
                    <div class="space-y-4">
                        <div class="relative">
                            <p class="text-[10px] text-zinc-500 mb-1 ml-1 uppercase">Search Full Menu</p>
                            <input id="menu-search" type="text" placeholder="Type name (e.g. 'burger', 'pizza')..." class="input-field" oninput="searchMenu()" autocomplete="off">
                            <div id="suggestions" class="suggestion-box hidden"></div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <p class="text-[10px] text-zinc-500 mb-1 ml-1 uppercase">Quantity</p>
                                <input id="manual-qty" type="number" value="1" oninput="updateManualTotal()" class="input-field">
                            </div>
                            <div>
                                <p class="text-[10px] text-zinc-500 mb-1 ml-1 uppercase">Price</p>
                                <input id="manual-price" type="number" readonly class="input-field opacity-40">
                            </div>
                        </div>

                        <div id="manual-total-display" class="bg-orange-500/10 p-4 rounded-xl text-center text-2xl font-black text-orange-500 border border-orange-500/20">0 Birr</div>
                        
                        <button onclick="createManualOrder()" class="w-full bg-orange-500 text-black font-black py-4 rounded-xl uppercase text-xs tracking-widest hover:bg-orange-400 transition-colors">Confirm & Send</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <h2 class="text-xs font-black uppercase text-orange-500 mb-4 ml-2 tracking-widest">Incoming</h2>
                <div id="order-queue" class="space-y-4"></div>
            </div>

            <div class="lg:col-span-2">
                <h2 class="text-xs font-black uppercase text-zinc-500 mb-4 ml-2 tracking-widest">Daily Sales List</h2>
                <div class="card p-4 h-[600px] overflow-y-auto">
                    <table class="w-full text-left text-[11px]">
                        <thead class="bg-black/50 sticky top-0">
                            <tr class="text-zinc-500 uppercase">
                                <th class="pb-3 px-2">Time</th>
                                <th class="pb-3">Item</th>
                                <th class="pb-3">Qty</th>
                                <th class="pb-3 text-right pr-2">Total</th>
                            </tr>
                        </thead>
                        <tbody id="sales-table-body" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");
        const staffName = sessionStorage.getItem('staffName') || 'Cashier';
        document.getElementById('staff-name-display').innerText = `Active: ${staffName}`;

        // YOUR FULL MENU DATA LOADED HERE
        const carmelMenu = [
            { c:'burger', n:'House Special Burger', p:650 },
            { c:'burger', n:'Fasting Burger', p:390 },
            { c:'burger', n:'Classic Beef Burger', p:490 },

            { c:'Chicken, Wraps & Sandwiches', n:'Egg Sandwich', p:190 },
            { c:'Chicken, Wraps & Sandwiches', n:'Vegetable Sandwich', p:290 },
            { c:'Chicken, Wraps & Sandwiches', n:'Tuna Sandwich', p:440 },
            { c:'discount Combos', n:'Kuriftu Combo (3 Mini + 2 Pizza)', p:1290 },
            { c:'discount Combos', n:'Kilole Combo (+2 Mojitos) 🍹', p:1590 },
            { c:'discount Combos', n:'Calalaqa Combo (+2 Fried Chicken)', p:1290 },
            { c:'discount Combos', n:'Hora Combo (+Chicken +Mojitos) 🍹', p:1990 },
            { c:'discount Combos', n:'Babogaya Combo (2 Mini + Juice)', p:600 },

            { c:'pizza', n:'Cheese Pizza (Personal)', p:400 },
            { c:'breakfast', n:'Full Breakfast', p:150 },

            { c:'juice', n:'Strawberry 🍓', p:230 },
            { c:'juice', n:'Mixed Juice 🍹', p:250 },
            { c:'juice', n:'Banana Milkshake 🍌', p:200 },
            { c:'juice', n:'Strawberry Shake 🍓', p:250 },
            { c:'juice', n:'Mango Shake 🥭', p:250 },
            { c:'juice', n:'Avocado + Chocolate Shake', p:270 },
            { c:'juice', n:'Oreo + Chocolate 🍪', p:290 },

            { c:'juice', n:'Strawberry Mojito 🍓', p:200 },

            { c:'juice', n:'Lemon Mint Mojito 🍋', p:200 },
            { c:'coffee&tea', n:'Jebena Coffee ★', p:40 },
            { c:'coffee&tea', n:'Machine Coffee ★', p:70 },
            { c:'coffee&tea', n:'Macchiato ★', p:70 },
            { c:'coffee&tea', n:'Cappuccino', p:100 },
            { c:'coffee&tea', n:'Latte', p:100 },
            { c:'coffee&tea', n:'Hot Chocolate', p:100 },
            { c:'coffee&tea', n:'Milk', p:70 },
            { c:'coffee&tea', n:'Black Tea', p:40 },
            { c:'coffee&tea', n:'Flavour Tea', p:70 },
            { c:'coffee&tea', n:'Qashir Tea', p:70 },
            { c:'coffee&tea', n:'Lewz Tea', p:70 },
            { c:'coffee&tea', n:'Special Tea', p:100 },
            { c:'coffee&tea', n:'Iced Milk', p:100 },
            { c:'coffee&tea', n:'Iced Coffee', p:120 },
            { c:'coffee&tea', n:'Iced Latte', p:150 },
            { c:'coffee&tea', n:'Soft Drink', p:70 },
            { c:'coffee&tea', n:'Water', p:35 },
            { c:'coffee&tea', n:'Sinq', p:120 }
        ];

        let selectedItem = null;
        let dailySales = JSON.parse(localStorage.getItem('carmel_sales_list')) || [];

        function searchMenu() {
            const query = document.getElementById('menu-search').value.toLowerCase();
            const suggestionBox = document.getElementById('suggestions');
            suggestionBox.innerHTML = '';
            if (query.length < 1) { suggestionBox.classList.add('hidden'); return; }

            const matches = carmelMenu.filter(item => item.n.toLowerCase().includes(query));
            if (matches.length > 0) {
                matches.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = `
                        <div><span class="category-tag mr-2">${item.c}</span> ${item.n}</div> 
                        <span class="text-orange-500 font-bold">${item.p} Birr</span>`;
                    div.onclick = () => selectItem(item);
                    suggestionBox.appendChild(div);
                });
                suggestionBox.classList.remove('hidden');
            } else { suggestionBox.classList.add('hidden'); }
        }

        function selectItem(item) {
            selectedItem = item;
            document.getElementById('menu-search').value = item.n;
            document.getElementById('manual-price').value = item.p;
            document.getElementById('suggestions').classList.add('hidden');
            updateManualTotal();
        }

        function updateManualTotal() {
            const qty = document.getElementById('manual-qty').value || 0;
            const price = document.getElementById('manual-price').value || 0;
            document.getElementById('manual-total-display').innerText = `${qty * price} Birr`;
        }

        async function createManualOrder() {
            if(!selectedItem) return alert("Select an item first");
            const qty = parseInt(document.getElementById('manual-qty').value);
            const total = qty * selectedItem.p;
            
            const { error } = await _supabase.from('orders').insert([{ 
                item_name: selectedItem.n, quantity: qty, total_price: total, status: 'done' 
            }]);

            if(!error) {
                dailySales.push({ 
                    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 
                    item: selectedItem.n, qty, price: total 
                });
                updateUI();
                document.getElementById('menu-search').value = "";
                document.getElementById('manual-price').value = "";
                selectedItem = null;
                updateManualTotal();
            }
        }

        async function fetchOrders() {
            const { data } = await _supabase.from('orders').select('*').eq('status', 'pending');
            const queue = document.getElementById('order-queue');
            queue.innerHTML = '';
            if (data) data.forEach(order => {
                queue.innerHTML += `
                    <div class="card p-4 border-orange-500/20">
                        <p class="font-black uppercase text-sm">${order.item_name}</p>
                        <div class="flex justify-between items-center mt-2">
                            <p class="text-[11px] text-orange-500">${order.quantity} pcs — ${order.total_price} Birr</p>
                            <button onclick="confirmOrder('${order.id}', '${order.item_name}', ${order.quantity}, ${order.total_price})" class="bg-white text-black font-black px-4 py-1.5 rounded-lg uppercase text-[9px] hover:bg-orange-500 hover:text-white transition-all">Confirm</button>
                        </div>
                    </div>`;
            });
        }

        async function confirmOrder(id, item, qty, price) {
            const { error } = await _supabase.from('orders').update({ status: 'done' }).eq('id', id);
            if(!error) {
                dailySales.push({ 
                    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 
                    item, qty, price 
                });
                updateUI();
                fetchOrders();
            }
        }

        function updateUI() {
            const table = document.getElementById('sales-table-body');
            table.innerHTML = '';
            let totalMoney = 0;
            dailySales.forEach(s => {
                totalMoney += s.price;
                table.innerHTML = `
                    <tr class="hover:bg-white/[0.02] transition-all">
                        <td class="py-4 px-2 text-zinc-600 font-mono">${s.time}</td>
                        <td class="py-4 font-bold uppercase">${s.item}</td>
                        <td class="py-4">${s.qty}</td>
                        <td class="py-4 text-orange-500 font-black text-right pr-2">${s.price}</td>
                    </tr>` + table.innerHTML;
            });
            document.getElementById('daily-money').innerText = `${totalMoney} Birr`;
            localStorage.setItem('carmel_sales_list', JSON.stringify(dailySales));
        }

        updateUI();
        fetchOrders();
        setInterval(fetchOrders, 5000);
    </script>
</body>
</html>
