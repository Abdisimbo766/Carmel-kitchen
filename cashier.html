<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carmel - Cashier PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
</style>
</head>

<body class="bg-slate-50 p-4 pb-24">

<!-- READY -->
<div id="ready-tray" class="flex gap-2 flex-wrap mb-4"></div>

<div class="max-w-4xl mx-auto">

<!-- SALES -->
<div class="bg-white p-5 rounded-2xl mb-4">
    <p class="text-xs text-gray-400">Today's Sales</p>
    <h1 id="daily-total" class="text-3xl font-black text-green-600">0 Birr</h1>
    <button onclick="openReport()" class="mt-2 text-sm bg-black text-white px-3 py-1 rounded">📊 Report</button>
</div>

<!-- EXPENSE -->
<div class="bg-white p-5 rounded-2xl mb-4">
<h2 class="font-bold mb-2">Add Expense</h2>
<input id="exp-name" placeholder="Item" class="border p-2 w-full mb-2">
<input id="exp-amount" type="number" placeholder="Amount" class="border p-2 w-full mb-2">
<button onclick="addExpense()" class="bg-red-500 text-white px-3 py-2 rounded w-full">Add Expense</button>
</div>

<!-- PENDING -->
<h2 class="font-black mb-2">Pending Orders</h2>
<div id="pending-list" class="space-y-3"></div>

</div>

<!-- REPORT MODAL -->
<div id="reportModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center">
<div class="bg-white p-6 rounded-2xl w-[90%] max-w-md">
<h2 class="font-black text-lg mb-3">Daily Report</h2>

<p>Total Sales: <b id="r-sales">0</b></p>
<p>Total Expense: <b id="r-expense">0</b></p>
<p>Profit: <b id="r-profit">0</b></p>

<button onclick="downloadExcel()" class="bg-green-600 text-white px-3 py-2 rounded w-full mt-3">⬇ Download Excel</button>
<button onclick="closeReport()" class="bg-gray-300 px-3 py-2 rounded w-full mt-2">Close</button>

</div>
</div>

<script>

// ---------- SUPABASE ----------
const supabaseClient = supabase.createClient(
"https://csdpoyqbkjljaqknunyv.supabase.co",
"sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC"
);

// ---------- SOUND ----------
const sound = new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3");

// ---------- HELPERS ----------
function clean(v){ return (v && v!="EMPTY" && v!="null") ? v : ""; }

// ---------- IMAGE ----------
function viewImage(url){
let w=window.open();
w.document.write(`<img src="${url}" style="width:100%">`);
}

// ---------- VERIFY ----------
async function verifyOrder(id,price){
await supabaseClient.from('orders').update({status:'verified'}).eq('id',id);

let s=Number(localStorage.getItem('sales')||0);
localStorage.setItem('sales', s+Number(price));

loadOrders();
}

// ---------- CANCEL ----------
async function cancelOrder(id){
if(!confirm("Cancel?")) return;
await supabaseClient.from('orders').update({status:'cancelled'}).eq('id',id);
loadOrders();
}

// ---------- EXPENSE ----------
function addExpense(){
let name=document.getElementById('exp-name').value;
let amount=Number(document.getElementById('exp-amount').value);

let e=JSON.parse(localStorage.getItem('expenses')||"[]");
e.push({name,amount});
localStorage.setItem('expenses',JSON.stringify(e));

alert("Expense Added");
}

// ---------- READY ----------
async function loadReady(){
const {data}=await supabaseClient.from('orders').select('queue_no').eq('status','ready');
let tray=document.getElementById('ready-tray');
tray.innerHTML='';
if(data){
data.forEach(o=>{
let d=document.createElement('div');
d.className="bg-green-600 text-white px-3 py-1 rounded-full";
d.innerText="#"+o.queue_no+" Ready";
tray.appendChild(d);
});
}
}

// ---------- LOAD ----------
async function loadOrders(){
const {data}=await supabaseClient.from('orders').select('*').eq('status','pending');
let list=document.getElementById('pending-list');
list.innerHTML='';

if(data){
data.forEach(o=>{
let items=[clean(o.food_list),clean(o.drink_list),clean(o.items)].filter(x=>x!="").join(", ");

let d=document.createElement('div');
d.className="bg-white p-4 rounded shadow";

d.innerHTML=`
<b>#${o.queue_no}</b> - ${o.total_price} Birr
<p>${items}</p>

${o.payment_screenshot ? `<img src="${o.payment_screenshot}" onclick="viewImage('${o.payment_screenshot}')" class="h-32 w-full object-cover my-2">` : ''}

<div class="flex gap-2">
<button onclick="verifyOrder('${o.id}','${o.total_price}')" class="bg-green-600 text-white px-2 py-1 rounded flex-1">✔</button>
<button onclick="cancelOrder('${o.id}')" class="bg-red-600 text-white px-2 py-1 rounded flex-1">✖</button>
</div>
`;

list.appendChild(d);
});
}

updateSales();
loadReady();
}

// ---------- SALES ----------
function updateSales(){
document.getElementById('daily-total').innerText=(localStorage.getItem('sales')||0)+" Birr";
}

// ---------- REPORT ----------
function openReport(){
let sales=Number(localStorage.getItem('sales')||0);
let exp=JSON.parse(localStorage.getItem('expenses')||"[]").reduce((a,b)=>a+b.amount,0);

document.getElementById('r-sales').innerText=sales;
document.getElementById('r-expense').innerText=exp;
document.getElementById('r-profit').innerText=sales-exp;

document.getElementById('reportModal').classList.remove('hidden');
document.getElementById('reportModal').classList.add('flex');
}

function closeReport(){
document.getElementById('reportModal').classList.add('hidden');
}

// ---------- EXPORT ----------
function downloadExcel(){
let sales=localStorage.getItem('sales')||0;
let exp=JSON.parse(localStorage.getItem('expenses')||"[]");

let csv="Type,Name,Amount\n";
csv+=`Sales,Total,${sales}\n`;

exp.forEach(e=>{
csv+=`Expense,${e.name},${e.amount}\n`;
});

let blob=new Blob([csv],{type:'text/csv'});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download="report.csv";
a.click();
}

// ---------- REALTIME ----------
supabaseClient.channel('orders')
.on('postgres_changes',{event:'*',schema:'public',table:'orders'},(p)=>{
if(p.new && p.new.status==="ready") sound.play();
loadOrders();
}).subscribe();

// ---------- START ----------
loadOrders();

</script>

</body>
</html>
