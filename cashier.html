<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Admin | POS & Kitchen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { border-bottom: 4px solid #f39c12; color: #f39c12; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="glass p-4 rounded-3xl">
            <p class="text-[10px] uppercase font-bold text-gray-400">Total Sales</p>
            <h2 class="text-xl font-black text-green-400"><span id="stat-sales">0</span> <small class="text-xs">ETB</small></h2>
        </div>
        <div class="glass p-4 rounded-3xl">
            <p class="text-[10px] uppercase font-bold text-gray-400">Daily Expenses</p>
            <h2 class="text-xl font-black text-red-400"><span id="stat-exp">0</span> <small class="text-xs">ETB</small></h2>
        </div>
        <div class="glass p-4 rounded-3xl text-orange-400">
            <p class="text-[10px] uppercase font-bold text-gray-400">Net Profit</p>
            <h2 class="text-xl font-black" id="stat-net">0</h2>
        </div>
        <div class="glass p-4 rounded-3xl">
            <p class="text-[10px] uppercase font-bold text-gray-400">Order Count</p>
            <h2 class="text-xl font-black" id="stat-count">#0</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-8 space-y-6">
            <div class="flex gap-8 border-b border-white/10 px-4">
                <button onclick="switchTab('pos')" id="btn-pos" class="pb-4 font-black uppercase text-xs tab-active">New Sale (POS)</button>
                <button onclick="switchTab('incoming')" id="btn-incoming" class="pb-4 font-black uppercase text-xs text-gray-500">Online Orders <span id="online-badge" class="bg-red-500 text-white px-2 py-0.5 rounded-full text-[10px] hidden">0</span></button>
                <button onclick="switchTab('ledger')" id="btn-ledger" class="pb-4 font-black uppercase text-xs text-gray-500">Expenses/Ledger</button>
            </div>

            <div id="tab-pos" class="space-y-4">
                <div class="grid grid-cols-3 md:grid-cols-5 gap-2 overflow-x-auto hide-scroll">
                    <button onclick="addToCart('Special Burger', 650)" class="glass p-3 rounded-2xl text-[10px] font-bold hover:bg-orange-500">Burger</button>
                    <button onclick="addToCart('Special Pizza', 690)" class="glass p-3 rounded-2xl text-[10px] font-bold hover:bg-orange-500">Pizza</button>
                    <button onclick="addToCart('Jebena Coffee', 40)" class="glass p-3 rounded-2xl text-[10px] font-bold hover:bg-orange-500">Coffee</button>
                    <button onclick="addToCart('Avocado Juice', 180)" class="glass p-3 rounded-2xl text-[10px] font-bold hover:bg-orange-500">Juice</button>
                </div>
                <div class="glass rounded-[2rem] p-6">
                    <h3 class="font-black mb-4">Current Order List</h3>
                    <div id="pos-cart" class="space-y-2 min-h-[200px]">
                        </div>
                    <div class="mt-6 flex justify-between items-center pt-4 border-t border-white/10">
                        <div>
                            <p class="text-xs text-gray-400">Total Amount</p>
                            <h2 class="text-3xl font-black text-orange-500"><span id="pos-total">0</span> <small class="text-sm">ETB</small></h2>
                        </div>
                        <button onclick="confirmPOSOrder()" class="bg-orange-500 hover:bg-orange-600 px-8 py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Send to Kitchen</button>
                    </div>
                </div>
            </div>

            <div id="tab-incoming" class="hidden space-y-4">
                <div id="incoming-list" class="space-y-3">
                    <p class="text-center text-gray-500 py-10">No pending online orders...</p>
                </div>
            </div>

            <div id="tab-ledger" class="hidden space-y-4">
                <div class="glass p-6 rounded-[2rem] grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <h3 class="font-black mb-4">Record Daily Purchase</h3>
                        <div class="space-y-3">
                            <input id="exp-name" type="text" placeholder="Item (e.g., Charcoal, Meat, Milk)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                            <input id="exp-amt" type="number" placeholder="Amount (ETB)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                            <button onclick="addExpense()" class="w-full bg-red-500/20 text-red-400 p-4 rounded-xl font-black uppercase">Add Expense</button>
                        </div>
                    </div>
                    <div>
                        <h3 class="font-black mb-4">Expense History</h3>
                        <div id="exp-history" class="space-y-2 text-xs">
                            </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4">
            <div class="glass rounded-[2.5rem] p-6 h-full border-l-4 border-orange-500">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black uppercase italic">Kitchen Queue</h2>
                    <span class="bg-orange-500 text-black text-[10px] font-black px-3 py-1 rounded-full">LIVE</span>
                </div>
                <div id="kitchen-queue" class="space-y-4">
                    </div>
            </div>
        </div>

    </div>

    <script>
        let totalSales = 0;
        let totalExp = 0;
        let orderCount = 100; // Starting order number
        let currentCart = [];
        let expenses = [];

        // 1. POS LOGIC
        function addToCart(name, price) {
            currentCart.push({ name, price });
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('pos-cart');
            let total = 0;
            list.innerHTML = currentCart.map((item, i) => {
                total += item.price;
                return `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                    <span class="text-xs font-bold uppercase">${item.name}</span>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-orange-400">${item.price}</span>
                        <button onclick="removeFromCart(${i})" class="text-red-500 font-bold">×</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('pos-total').innerText = total;
        }

        function removeFromCart(i) {
            currentCart.splice(i, 1);
            renderCart();
        }

        // 2. ORDER CONFIRMATION (BOTH POS & ONLINE)
        function confirmPOSOrder() {
            if (currentCart.length === 0) return;
            const total = parseInt(document.getElementById('pos-total').innerText);
            const itemsList = currentCart.map(i => i.name).join(', ');
            
            processOrderToKitchen(orderCount++, itemsList, total, "Cashier POS");
            currentCart = [];
            renderCart();
        }

        function processOrderToKitchen(num, items, money, source) {
            // Update Money
            totalSales += money;
            updateStats();

            // Send to Kitchen Queue
            const queue = document.getElementById('kitchen-queue');
            const orderDiv = document.createElement('div');
            orderDiv.className = "bg-white/5 border border-white/10 p-4 rounded-2xl space-y-2 animate-pulse";
            orderDiv.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-black bg-orange-500 text-black px-2 py-0.5 rounded">#${num}</span>
                    <span class="text-[10px] text-gray-500">${source}</span>
                </div>
                <p class="text-xs font-bold">${items}</p>
                <button onclick="this.parentElement.remove()" class="w-full mt-2 py-2 bg-green-500/10 text-green-500 rounded-lg text-[10px] font-black uppercase">Complete & Remove</button>
            `;
            queue.prepend(orderDiv);
        }

        // 3. EXPENSE LOGIC
        function addExpense() {
            const name = document.getElementById('exp-name').value;
            const amt = parseInt(document.getElementById('exp-amt').value);
            if (!name || !amt) return;

            totalExp += amt;
            expenses.unshift({ name, amt, time: new Date().toLocaleTimeString() });
            
            const log = document.getElementById('exp-history');
            log.innerHTML = expenses.map(e => `
                <div class="flex justify-between p-2 bg-red-500/5 rounded-lg mb-1 border border-red-500/10">
                    <span>${e.name}</span>
                    <span class="font-bold text-red-400">-${e.amt} ETB</span>
                </div>
            `).join('');
            
            updateStats();
            document.getElementById('exp-name').value = '';
            document.getElementById('exp-amt').value = '';
        }

        function updateStats() {
            document.getElementById('stat-sales').innerText = totalSales;
            document.getElementById('stat-exp').innerText = totalExp;
            document.getElementById('stat-net').innerText = (totalSales - totalExp) + " ETB";
            document.getElementById('stat-count').innerText = "#" + (orderCount - 100);
        }

        // UI TAB SWITCHING
        function switchTab(tab) {
            ['pos', 'incoming', 'ledger'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
            ['pos', 'incoming', 'ledger'].forEach(t => document.getElementById('btn-'+t).classList.remove('tab-active'));
            document.getElementById('tab-'+tab).classList.remove('hidden');
            document.getElementById('btn-'+tab).classList.add('tab-active');
        }
    </script>
</body>
</html>
