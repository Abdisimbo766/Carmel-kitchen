<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel POS - Full Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1rem; }
        /* Left Sidebar Categories */
        .cat-btn { background: #111; border: 1px solid #222; padding: 18px 5px; border-radius: 12px; transition: 0.2s; text-align: center; }
        .cat-btn:hover { border-color: #f97316; background: #1a1a1a; }
        .cat-btn.active { background: #f97316; color: black; border-color: #f97316; font-weight: 900; }
        /* Main Item Buttons */
        .item-btn { background: #111; border: 1px solid #222; padding: 12px 6px; border-radius: 10px; font-size: 10px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; min-height: 70px; }
        .item-btn:hover { border-color: #f97316; transform: scale(1.02); }
        .item-btn:active { transform: scale(0.95); }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 flex flex-col">
    
    <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-3">
        <h1 class="text-xl font-black text-orange-500 italic tracking-tighter uppercase">CARMEL POS SYSTEM</h1>
        <div class="text-right">
            <span class="text-[10px] text-zinc-500 uppercase block tracking-widest">Revenue Today</span>
            <span id="daily-money" class="text-xl font-black text-white">0 Birr</span>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-4 flex-grow overflow-hidden">
        
        <div class="col-span-2 flex flex-col gap-2 overflow-y-auto pr-1">
            <button onclick="showItems('burger', this)" class="cat-btn active"><span class="text-[10px] uppercase font-black">Burgers</span></button>
            <button onclick="showItems('Chicken, Wraps & Sandwiches', this)" class="cat-btn"><span class="text-[10px] uppercase font-black">Wraps & Chicken</span></button>
            <button onclick="showItems('pizza', this)" class="cat-btn"><span class="text-[10px] uppercase font-black">Pizza</span></button>
            <button onclick="showItems('breakfast', this)" class="cat-btn"><span class="text-[10px] uppercase font-black">Breakfast</span></button>
            <button onclick="showItems('juice', this)" class="cat-btn"><span class="text-[10px] uppercase font-black">Juices & Shakes</span></button>
            <button onclick="showItems('coffee&tea', this)" class="cat-btn"><span class="text-[10px] uppercase font-black">Coffee & Tea</span></button>
            <button onclick="showItems('discount Combos', this)" class="cat-btn"><span class="text-[10px] uppercase font-black">Combos</span></button>
        </div>

        <div class="col-span-7 card p-4 overflow-y-auto">
            <div id="item-display-grid" class="grid grid-cols-4 gap-2">
                </div>
        </div>

        <div class="col-span-3 flex flex-col gap-3">
            <div class="card flex-grow flex flex-col overflow-hidden border-orange-500/30 bg-orange-500/[0.01]">
                <div class="p-3 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                    <span class="text-[10px] font-black uppercase text-orange-500 tracking-widest">Live Order</span>
                    <button onclick="clearCart()" class="text-[9px] text-zinc-600 hover:text-white uppercase font-bold">Clear All</button>
                </div>
                
                <div id="cart-items" class="flex-grow overflow-y-auto p-2 space-y-1.5">
                    </div>

                <div class="p-4 bg-orange-500 text-black">
                    <div class="flex justify-between items-end mb-3">
                        <span class="text-[10px] font-black uppercase opacity-60">Total</span>
                        <span id="cart-total" class="text-3xl font-black leading-none">0 Birr</span>
                    </div>
                    <button onclick="completeOrder()" class="w-full py-4 bg-black text-white font-black rounded-xl uppercase text-xs tracking-widest hover:bg-zinc-900 transition-all">
                        Complete Order
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");
        
        const carmelMenu = [
            // BURGERS
            { c:'burger', n:'House Special Burger', p:650 }, { c:'burger', n:'Fasting Burger', p:390 }, { c:'burger', n:'Classic Beef Burger', p:490 }, { c:'burger', n:'Chessic Beef Burger ★', p:550 }, { c:'burger', n:'Spicy Hot Burger 🔥', p:550 }, { c:'burger', n:'Chicken Double Burger', p:590 }, { c:'burger', n:'Double Beef Burger', p:590 }, { c:'burger', n:'BBQ Juicy Burger', p:590 }, { c:'burger', n:'Mountain Burger (Taple) 🏔️', p:720 }, { c:'burger', n:'VIP Burger 🔥', p:790 }, { c:'burger', n:'2 Pc Special Bite', p:450 }, { c:'burger', n:'3 Pc Special Bite', p:550 }, { c:'burger', n:'5 Pc Special Bite', p:950 }, { c:'burger', n:'Chips 🍟', p:190 },
            // CHICKEN, WRAPS & SANDWICHES
            { c:'Chicken, Wraps & Sandwiches', n:'2 Pc Fried Chicken', p:490 }, { c:'Chicken, Wraps & Sandwiches', n:'3 Pc Fried Chicken', p:740 }, { c:'Chicken, Wraps & Sandwiches', n:'5 Pc Fried Chicken', p:1190 }, { c:'Chicken, Wraps & Sandwiches', n:'Beef Wrap', p:490 }, { c:'Chicken, Wraps & Sandwiches', n:'Chicken Wrap', p:490 }, { c:'Chicken, Wraps & Sandwiches', n:'Vegetable Wrap', p:350 }, { c:'Chicken, Wraps & Sandwiches', n:'Egg Sandwich', p:190 }, { c:'Chicken, Wraps & Sandwiches', n:'Vegetable Sandwich', p:290 }, { c:'Chicken, Wraps & Sandwiches', n:'Tuna Sandwich', p:440 },
            // COMBOS
            { c:'discount Combos', n:'Kuriftu Combo', p:1290 }, { c:'discount Combos', n:'Kilole Combo 🍹', p:1590 }, { c:'discount Combos', n:'Calalaqa Combo', p:1290 }, { c:'discount Combos', n:'Hora Combo 🍹', p:1990 }, { c:'discount Combos', n:'Babogaya Combo', p:600 }, { c:'discount Combos', n:'Bishe Combo', p:600 },
            // PIZZA
            { c:'pizza', n:'Special Pizza (Reg)', p:690 }, { c:'pizza', n:'Special Pizza (Per)', p:490 }, { c:'pizza', n:'Tuna Pizza (Reg)', p:670 }, { c:'pizza', n:'Tuna Pizza (Per)', p:470 }, { c:'pizza', n:'Beef Pizza (Reg)', p:650 }, { c:'pizza', n:'Beef Pizza (Per)', p:450 }, { c:'pizza', n:'Chicken Pizza (Reg)', p:650 }, { c:'pizza', n:'Chicken Pizza (Per)', p:450 }, { c:'pizza', n:'Vegetable Pizza (Reg)', p:550 }, { c:'pizza', n:'Vegetable Pizza (Per)', p:400 }, { c:'pizza', n:'Cheese Pizza (Reg)', p:550 }, { c:'pizza', n:'Cheese Pizza (Per)', p:400 },
            // BREAKFAST
            { c:'breakfast', n:'Full Breakfast', p:150 }, { c:'breakfast', n:'Special Full', p:200 }, { c:'breakfast', n:'Chachabesa', p:200 }, { c:'breakfast', n:'Special Chachabesa', p:250 }, { c:'breakfast', n:'Fatria', p:250 }, { c:'breakfast', n:'Special Fatria', p:350 }, { c:'breakfast', n:'Firfir', p:170 }, { c:'breakfast', n:'Tibs Firfir', p:290 }, { c:'breakfast', n:'Egg', p:170 }, { c:'breakfast', n:'Egg with Meat', p:290 }, { c:'breakfast', n:'Pasta', p:190 }, { c:'breakfast', n:'Pasta with Meat', p:290 }, { c:'breakfast', n:'Tibs', p:450 }, { c:'breakfast', n:'Avocado Liblib', p:200 },
            // JUICE & SHAKES
            { c:'juice', n:'Avocado 🥑', p:180 }, { c:'juice', n:'Papaya 🥭', p:180 }, { c:'juice', n:'Pineapple 🍍', p:200 }, { c:'juice', n:'Mango 🥭', p:230 }, { c:'juice', n:'Strawberry 🍓', p:230 }, { c:'juice', n:'Mixed Juice 🍹', p:250 }, { c:'juice', n:'Banana Shake 🍌', p:200 }, { c:'juice', n:'Strawberry Shake 🍓', p:250 }, { c:'juice', n:'Mango Shake 🥭', p:250 }, { c:'juice', n:'Avocado+Choc Shake', p:270 }, { c:'juice', n:'Oreo + Choc 🍪', p:290 }, { c:'juice', n:'Chocolate Shake 🍫', p:290 }, { c:'juice', n:'Carmel Special ⭐', p:320 }, { c:'juice', n:'Strawberry Mojito 🍓', p:200 }, { c:'juice', n:'Pineapple Mojito 🍍', p:200 }, { c:'juice', n:'Lemon Mint Mojito 🍋', p:200 },
            // COFFEE & TEA
            { c:'coffee&tea', n:'Jebena Coffee ★', p:40 }, { c:'coffee&tea', n:'Machine Coffee ★', p:70 }, { c:'coffee&tea', n:'Macchiato ★', p:70 }, { c:'coffee&tea', n:'Cappuccino', p:100 }, { c:'coffee&tea', n:'Latte', p:100 }, { c:'coffee&tea', n:'Hot Chocolate', p:100 }, { c:'coffee&tea', n:'Milk', p:70 }, { c:'coffee&tea', n:'Black Tea', p:40 }, { c:'coffee&tea', n:'Flavour Tea', p:70 }, { c:'coffee&tea', n:'Qashir Tea', p:70 }, { c:'coffee&tea', n:'Lewz Tea', p:70 }, { c:'coffee&tea', n:'Special Tea', p:100 }, { c:'coffee&tea', n:'Iced Milk', p:100 }, { c:'coffee&tea', n:'Iced Coffee', p:120 }, { c:'coffee&tea', n:'Iced Latte', p:150 }, { c:'coffee&tea', n:'Soft Drink', p:70 }, { c:'coffee&tea', n:'Water', p:35 }, { c:'coffee&tea', n:'Sinq', p:120 }
        ];

        let cart = [];
        let totalDailyRevenue = 0;

        function showItems(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const grid = document.getElementById('item-display-grid');
            grid.innerHTML = '';
            carmelMenu.filter(i => i.c === cat).forEach(item => {
                grid.innerHTML += `
                    <button onclick='addToCart(${JSON.stringify(item)})' class="item-btn font-black uppercase text-white">
                        <span class="mb-1">${item.n}</span>
                        <span class="text-orange-500">${item.p}</span>
                    </button>`;
            });
        }

        function addToCart(item) {
            const found = cart.find(i => i.n === item.n);
            if(found) { 
                found.qty++; 
            } else { 
                cart.push({...item, qty: 1}); 
            }
            renderCart();
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item, idx) => {
                const itemTotal = item.p * item.qty;
                total += itemTotal;
                list.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/5">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black uppercase leading-tight">${item.n}</span>
                            <span class="text-[9px] text-orange-500 font-bold">${item.qty} x ${item.p} Birr</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-xs font-black">${itemTotal}</span>
                            <button onclick="removeFromCart(${idx})" class="text-zinc-600 hover:text-white font-bold px-1">×</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = total + " Birr";
        }

        function clearCart() { cart = []; renderCart(); }

        async function completeOrder() {
            if(cart.length === 0) return;
            
            for(const i of cart) {
                // Upload to Supabase
                await _supabase.from('orders').insert([{ 
                    item_name: i.n, 
                    quantity: i.qty, 
                    total_price: i.p * i.qty, 
                    status: 'done' 
                }]);
                totalDailyRevenue += (i.p * i.qty);
            }

            document.getElementById('daily-money').innerText = totalDailyRevenue + " Birr";
            clearCart();
            alert("Order Completed & Saved Successfully!");
        }

        // Initialize with Burgers
        showItems('burger', document.querySelector('.cat-btn'));
    </script>
</body>
</html>
