<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmel Cashier Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .input-field { background: #111; border: 1px solid rgba(255, 255, 255, 0.1); padding: 0.75rem; border-radius: 0.75rem; font-size: 0.875rem; width: 100%; color: white; }
        .btn-confirm { background: #fff; color: #000; font-weight: 900; transition: 0.3s; }
        .btn-confirm:hover { background: #f97316; color: #fff; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-orange-500/20 pb-4">
            <div>
                <h1 class="text-3xl font-black italic text-orange-500 uppercase">CASHIER</h1>
                <p id="staff-name-display" class="text-[10px] text-zinc-500 font-bold uppercase"></p>
            </div>
            
            <div class="flex gap-6 items-center">
                <div class="text-right">
                    <p id="daily-count" class="text-xl font-black text-white">0</p>
                    <p class="text-[9px] text-zinc-500 uppercase font-black">Orders</p>
                </div>
                <div class="text-right">
                    <p id="daily-money" class="text-xl font-black text-orange-500">0 Birr</p>
                    <p class="text-[9px] text-zinc-500 uppercase font-black">Revenue</p>
                </div>
                <button onclick="downloadSales()" class="bg-zinc-800 p-3 rounded-lg hover:bg-zinc-700">📥</button>
                <button onclick="clearDailySales()" class="text-zinc-800 hover:text-red-500">🗑️</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-1">
                <h2 class="text-xs font-black uppercase text-white mb-4 ml-2 tracking-widest">Walk-in Order</h2>
                <div class="card p-6 border-white/10 bg-white/[0.02]">
                    <div class="space-y-4">
                        <select id="menu-select" class="input-field" onchange="autoFillPrice()">
                            <option value="">-- Select Menu Item --</option>
                            <optgroup label="Coffee & Tea">
                                <option value="Jebena Coffee" data-price="35">Jebena Coffee (35 Birr)</option>
                                <option value="Macchiato" data-price="45">Macchiato (45 Birr)</option>
                                <option value="Tea" data-price="25">Tea (25 Birr)</option>
                            </optgroup>
                            <optgroup label="Juice & Shakes">
                                <option value="Carmel Special Shake" data-price="180">Carmel Special Shake (180 Birr)</option>
                                <option value="Avocado Juice" data-price="120">Avocado Juice (120 Birr)</option>
                                <option value="Mango Juice" data-price="110">Mango Juice (110 Birr)</option>
                                <option value="Milkshake" data-price="130">Milkshake (130 Birr)</option>
                            </optgroup>
                            <optgroup label="Mojitos">
                                <option value="Strawberry Mojito" data-price="140">Strawberry Mojito (140 Birr)</option>
                                <option value="Blueberry Mojito" data-price="150">Blueberry Mojito (150 Birr)</option>
                            </optgroup>
                        </select>
                        
                        <div class="grid grid-cols-2 gap-2">
                            <input id="manual-qty" type="number" value="1" oninput="updateManualTotal()" class="input-field">
                            <input id="manual-price" type="number" readonly class="input-field opacity-50">
                        </div>
                        <div id="manual-total-display" class="bg-orange-500/10 p-4 rounded-xl text-center text-xl font-black text-orange-500">0 Birr</div>
                        <button onclick="createManualOrder()" class="w-full bg-orange-500 text-black font-black py-4 rounded-xl uppercase text-xs tracking-widest">Send to Kitchen</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <h2 class="text-xs font-black uppercase text-orange-500 mb-4 ml-2 tracking-widest">Incoming Orders</h2>
                <div id="order-queue" class="space-y-4"></div>
            </div>

            <div class="lg:col-span-1">
                <h2 class="text-xs font-black uppercase text-zinc-500 mb-4 ml-2 tracking-widest">Log Expense</h2>
                <div class="card p-6 border-white/5">
                    <div class="space-y-3">
                        <select id="exp-item-select" class="input-field" onchange="toggleOtherBox()">
                            <option value="">Loading Inventory...</option>
                        </select>
                        <div id="other-note-container" class="hidden"><input id="exp-note" type="text" placeholder="Note" class="input-field border-orange-500/30"></div>
                        <div class="grid grid-cols-3 gap-1">
                            <input id="exp-qty" type="number" placeholder="Qty" class="input-field">
                            <select id="exp-unit-select" class="input-field">
                                <option value="pcs">pcs</option>
                                <option value="kg">kg</option>
                                <option value="liter">liter</option>
                            </select>
                            <input id="exp-price" type="number" placeholder="Price" class="input-field">
                        </div>
                        <button onclick="logPurchase()" class="w-full bg-zinc-800 text-white font-black py-3 rounded-xl uppercase text-[10px]">Save Expense</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <h2 class="text-xs font-black uppercase text-zinc-500 mb-4 ml-2 tracking-widest">Today's Sales</h2>
                <div class="card p-4 h-[600px] overflow-y-auto">
                    <table class="w-full text-left text-[11px]">
                        <tbody id="sales-table-body" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://csdpoyqbkjljaqknunyv.supabase.co", "sb_publishable_GZ9zqNM1CPfdyaEhLY_pOg_Fs4CSfrC");
        const staffName = sessionStorage.getItem('staffName') || 'Cashier';
        document.getElementById('staff-name-display').innerText = `Active: ${staffName}`;

        let dailySales = JSON.parse(localStorage.getItem('carmel_sales_list')) || [];

        function autoFillPrice() {
            const selected = document.getElementById('menu-select').options[document.getElementById('menu-select').selectedIndex];
            document.getElementById('manual-price').value = selected.dataset.price || 0;
            updateManualTotal();
        }

        function updateManualTotal() {
            const qty = document.getElementById('manual-qty').value || 0;
            const price = document.getElementById('manual-price').value || 0;
            document.getElementById('manual-total-display').innerText = `${qty * price} Birr`;
        }

        async function createManualOrder() {
            const item = document.getElementById('menu-select').value;
            const qty = parseInt(document.getElementById('manual-qty').value);
            const priceEach = parseInt(document.getElementById('manual-price').value);
            if(!item || !priceEach) return;

            const { error } = await _supabase.from('orders').insert([{ 
                item_name: item, quantity: qty, total_price: qty * priceEach, status: 'done' 
            }]);

            if(!error) {
                dailySales.push({ time: new Date().toLocaleTimeString(), item, qty, price: qty * priceEach });
                updateUI();
                alert("Order Sent");
            }
        }

        async function logPurchase() {
            const item = document.getElementById('exp-item-select').value;
            const qty = parseFloat(document.getElementById('exp-qty').value);
            const unit = document.getElementById('exp-unit-select').value;
            const price = parseFloat(document.getElementById('exp-price').value);
            if(!item || !qty || !price) return alert("Missing Info");

            const { error } = await _supabase.from('expenses').insert([{ 
                item_name: item, 
                amount_spent: qty * price, 
                quantity_bought: qty, 
                unit: unit, // Sending 'unit' prevents the NOT-NULL error
                bought_by: staffName 
            }]);

            if(!error) { alert("Expense Saved"); location.reload(); }
            else { alert(error.message); }
        }

        async function fetchOrders() {
            const { data } = await _supabase.from('orders').select('*').eq('status', 'pending');
            const queue = document.getElementById('order-queue');
            queue.innerHTML = '';
            if (data) data.forEach(order => {
                queue.innerHTML += `
                    <div class="card p-4 border-orange-500/20">
                        <p class="font-black uppercase">${order.item_name}</p>
                        <p class="text-xs text-orange-500">${order.quantity} pcs — ${order.total_price} Birr</p>
                        <button onclick="confirmOrder('${order.id}', '${order.item_name}', ${order.quantity}, ${order.total_price})" class="w-full mt-3 btn-confirm py-2 rounded-lg uppercase text-[10px]">Confirm</button>
                    </div>`;
            });
        }

        async function confirmOrder(id, item, qty, price) {
            const { error } = await _supabase.from('orders').update({ status: 'done' }).eq('id', id);
            if(!error) {
                dailySales.push({ time: new Date().toLocaleTimeString(), item, qty, price });
                updateUI();
                fetchOrders();
            }
        }

        function updateUI() {
            const table = document.getElementById('sales-table-body');
            table.innerHTML = '';
            let totalMoney = 0;
            dailySales.forEach(s => {
                totalMoney += s.price;
                table.innerHTML = `<tr><td class="py-3 font-bold uppercase">${s.item}</td><td>${s.qty}</td><td class="text-orange-500 font-black text-right">${s.price}</td></tr>` + table.innerHTML;
            });
            document.getElementById('daily-count').innerText = dailySales.length;
            document.getElementById('daily-money').innerText = `${totalMoney} Birr`;
            localStorage.setItem('carmel_sales_list', JSON.stringify(dailySales));
        }

        async function loadInventory() {
            const { data } = await _supabase.from('inventory').select('item_name');
            const select = document.getElementById('exp-item-select');
            select.innerHTML = '<option value="">-- Select Stock --</option>';
            if(data) data.forEach(i => select.innerHTML += `<option value="${i.item_name}">${i.item_name}</option>`);
        }

        function downloadSales() {
            const ws = XLSX.utils.json_to_sheet(dailySales);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sales");
            XLSX.writeFile(wb, "Daily_Sales.xlsx");
        }

        function clearDailySales() { if(prompt("Code:") === "2026") { dailySales = []; updateUI(); } }

        updateUI();
        loadInventory();
        fetchOrders();
        setInterval(fetchOrders, 5000);
    </script>
</body>
</html>
